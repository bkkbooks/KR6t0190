body:
  text: 諸尊要抄第四心經法理趣經法寶樓閣法六字經法法花法心經法本尊般若菩薩部主不動諸尊三十七尊印言如常理趣經法本尊金剛薩埵種子吽三五古部主大日諸尊三十七尊印內五古真言如常曩莫三曼多縛曰羅赦戰拏摩訶盧灑拏吽娑縛賀梵號阿利耶縛曰羅薩怛縛密號真如金剛師主口授云振鈴之次段段印一一結之云云形像肉色左手作拳當左胸右手當心持五古坐赤蓮花寶樓閣法本尊釋迦種子縛入三摩鉢印智吉祥言寶樓閣大呪部主胎藏大日諸尊三十七尊梵號曩謨釋迦牟尼密號寂靜金剛六字經法種子行不可得三弓尊像左右第一手印左第二戟右刀左第三月右日印觀宿大僧都説曰以二大指捻中指頭仰定掌覆惠掌以惠頭指入定大中間以定小指入惠大中間以惠小指捻定無名指頭以惠無名指捻定頭指以此印為根本印或説觀音印也又陰陽反閉印云云又印內縛二中指相立展二頭指捻中指上節二大指並立真言如常金輪如來形黃色法界定印上有輪光有七輪六觀音變成獨古杵杵變成聖觀世音菩薩根本印二手外縛頭指蓮花唵阿嚕力迦娑縛賀八葉蓮花變成千手千眼觀世音自在菩薩八葉印唵縛曰羅達麼吉里變成寶形寶形變成如意輪觀自在菩薩有三種印真言變成軍持軍持變成十一面觀自在菩薩合掌唵嚕慶入縛羅吉里變成甲胄甲胄變成準提觀自在菩薩印二手合掌二地二水交入掌屈二風著二火背二空著風側曩莫颯多南三藐三沒馱俱胝南怛儞也他唵者禮咮禮準胝娑縛賀印言如常禮佛句南無六字章句觀世音勸請句六字章句觀世音六大八大諸觀音觀宿僧都圖明仙僧都傳或本此月輪邊有人形六人貴布栴須比賀津良等呪咀神云云支度蘇蜜名香安息香五寶金銀真珠琥珀瑟瑟五香龍腦鬱金白檀丁子沈香五藥赤箭人參伏苓石菖蒲牛黃五穀稻穀大麥小麥緑豆油麻小燈臺伴僧座讀經料其數可隨人數弓一張佛右立之矢十二隻六隻副弓佛前立之二隻鳥居料四隻橛料已上例弓箭也大刀一腰佛左立之桑弓七張蘆箭四十九隻弓一張各具矢七隻置回爐邊或此弓箭不載支度葦七束箭并乳木等料百八并二十一乳木皆以葦造箭形以紙為羽云云白練糸一兩結線料紙五帖三類形矢羽等料三類形者天狐鳥狐地狐人形如常各以紙雕之淨衣鈍色已下委注子細支度不可有此注書樣在別紙壇樣四角橛以矢立之不用例橛左右鳥居又用矢云云嚴覺奉仕院御修法承仕前行備物具之間佛前大弓此圖定張立之而院被仰承仕云弓弦可立故僧正云云小野一説護摩作法調伏行之餘家説或息災修之不可然之由僧正示給之初火天段如常次部主段聖觀音專用之或金輪或馬頭次本尊段六字文次諸尊段六觀音如曼荼羅或以六觀音為本尊之時諸尊段用五大尊又三十七尊云云次世天段如常後火天段加修之又如恆次燒三類形護摩畢未置鈴杵以前燒之先燒人形次天狐次地狐也插箸燒爐火以器本入三類形之器也受其灰覆蓋不令散件灰七日了後相具結線送檀越令服之服怨敵之心也以湯可服之以酒不可服之次以蘆箭桑弓射拂六方東南西北上下其次第也上方矢天井射立之結線供養法了後護摩之間以伴僧一口令結線一時以一筋百八反結之三時三筋凡七日之間二十一筋也本裏云三尺五寸為法不足四五尺亦得云云若長日修時七日一筋可結之歟云云有解線法悉地成就之後解之但故僧正仁海僧都成尊俱不被行之伴僧時間讀經護摩末各令滿六觀音真言云云以師主御本書之法務本云云師主口傳云伴僧分讀經料四人有人語云宗意律師云護摩終鈴等未置本所之中間右脅機小土器入置取三類形置金剛盤上先以不動慈救呪一百八返誦次以六足尊呪一百八返誦然後誦降三世真言以獨古二十一返加持其後爐延上三類形置誦佉知佉知真言燒之燒之間觀云想一切衆生依作業輪回淨除此業得解脫潅頂之名法花法壇場莊嚴樣可見儀軌云云種子三昧耶五輪塔極深祕説云胎藏大日為本尊八大菩薩即八業九尊也云云部主不動諸尊段八大菩薩也曼荼羅之內塔是法界宮中一大塔也云云師主口傳云云是小野究竟祕祕説也部主不動諸尊三十七尊梵號蜜號御加持可用不動慈救呪辨事故云云正念誦真言曩莫薩縛怛他引蘖帝引毗庾二合尾濕縛二合目契毗藥二合薩栗縛二合他引阿阿暗惡惡莎賀印智拳印若求法之志有切者金剛界大日印此智拳印一字明可授之云云師主説也二佛共成名毗盧遮那故雖二佛即是一佛也法身佛故一切諸佛皆是大日如來也真言唵嚩曰羅馱都鑁是故金輪軌云不空譯十方剎土中唯有一佛乘如來之頂法等持諸佛體是故名智拳云云故以金剛界大日為此法本尊云云塔印極深祕祕或用率都婆印極深祕説云塔印之內觀二世尊右釋迦左多寶二佛同座演説妙法蓮花經觀師主口傳甚祕甚祕印是法界大塔也云云釋迦胎大日多寶金大日也真言歸命阿阿暗惡惡前四字如次開示悟入也又因行證入之義第五惡字是方便善巧智圓滿義也故以此五字真言為至極究竟云云經文云定惠力莊嚴以此度衆生云云故本尊即金剛界大日真言即胎藏也以定惠配當兩界又妙法蓮花經之題目即胎藏八葉九尊也香藥用事菟樓婆香者草香也煎之入鉢備壇上云云勸修寺法務説云或人御加持用金剛界大日真言有人用普賢真言有人用自我偈云云此法息災傳授了散念誦之時可讀誦經王云云禮佛句云云曩謨毗盧遮那薩怛他蘖多御本云以又御本重交了一交了建保六年二月十八日於遍智院以御本書了金剛佛子憲丨生丨二十七丨建長二年四月三十日賜樂坊御本書寫畢求法沙門顯成生丨二十二丨校合了
