body:
  text: 諸尊要抄第五愛染王大勝金剛五大虛空藏泥塔供養大佛頂光明真言法無垢淨光陀羅尼法愛染王敬愛天變所望此明王蓮花部為部主金剛部為父母云云種子三摩五古箭勸修寺法務説云云又説三摩箭祕祕説又云三摩白蓮最極祕密羅誐在之部主降三世諸尊十七尊勸請印大鉤召印真言摩訶素誐縛曰羅薩怛縛素羅多薩怛縛弱吽鑁斛普通三十七尊大鉤召印真言普供養明云云十七尊坐位根本印二手內縛竪合二中指右押左叉又名弓箭印惠運傳云左上叉之祕祕説云云名法身印真言唵摩訶羅誐縛曰羅烏瑟抳曬縛曰羅薩怛縛弱吽鑁斛又印外五古印用小呪口傳云除外三障云云真言曰吽摘枳吽弱又印內五古印用心呪口傳云除內三障真言曰吽悉地五種相應印以內縛五古印為本云云貞觀寺僧正真雅御傳祕祕云云內五古息災先印二風著火為增益先印二風作蓮花敬愛先印二風作三角調伏先印二風鉤鉤召也高野經藏有其書云云真言五種印用吽摘枳吽弱云云口傳云金剛界三摩耶會愛菩薩印言用之云云範俊傳云唵摩訶羅誐二手金剛拳縛曰羅烏瑟抳曬相叉內為縛縛曰羅薩怛縛直竪忍願如針弱吽鑁斛相交即成染是名根本印權僧正傳云五種相應印通用平等王真言云云但件真言五字各一字加置之祕事也息災印唵吽吽悉地娑縛賀增益印唵摘吽悉地娑縛賀敬愛印唵枳吽悉地娑縛賀調伏印唵吽吽悉地娑縛賀鉤召印唵弱吽悉地娑縛賀勸請句金剛愛染大明王三十七尊諸薩埵禮佛句南無縛曰羅囉誐冒知薩埵縛摩訶薩埵縛發願句愛染明王正念誦大呪或平等王真言御加持并伴僧大呪加持物呪用平等王真言又用吽悉地云云字輪觀奧師主口傳受之愛染王曼荼羅今此曼荼羅大師歸朝之時御所持云云醍醐寺以或人本師主令書之給師主云一説彼手表所求事也云云委細口傳在之吽悉地真言即名成就金剛薩埵一字心大勝心相應真言云云印外五師傳也大御室令問彼手於海僧正御僧正令注進給之彳者人王內心肝也不令奪生氣王黃也又説云左第三手持人王云云延壽命即此意也寂圓入道傳勸修寺嚴覺僧都云人王有六粒云云師子冠口傳云那麼此云人檀越姓名也委細口傳在之愛染王者即愛菩薩所變云云安然瑜祇經記明釋此義也金剛王儀軌是愛染王儀軌也非例金剛王云云師主口傳云東四菩薩即愛染王也云云座下寶瓶地天三摩耶形也可觀地天云云紅以八葉蓮花造之其上五寶其上劍羽二重置又以同薄樣小呪上可加姓名并所求事覆之其樣云吽摘枳吽弱其姓名并所求事娑縛賀如此書上覆之也敬愛法之時尤用之祕密説但護摩之時入箱壇中置之又人形杵尤用之以堅木可造櫻木尤吉也云云敬愛尤用之云云委細口傳也前大僧正定海語參議伊通云諸尊部主修瑜伽者心也是在小野僧正手迹云云師主勸修寺法務説云云白河院御年二十五之時被仰義範僧都云今年極重厄年也若過今年者今且可在世可延壽命法如何僧都奏云可令行悉地成就法御宣旨云何悉地成就法僧都奏云愛染王法也宣旨云極貴事哉云云或説師主語云內五古印上求菩提外五古印下化衆生云云師主云彼手表所求事云云隨事令持云云赤色紙等所求事書之令持可行之又云以紅薄樣若紙赤色染八葉蓮花造本尊壇燒之百八枚也但摩白檀香燒之義律師傳云若國王愛如此云云赤色之紙二帖許入云云大勝金剛敬愛種子三摩五古大日變十二臂也部主愛染王諸尊三十七尊印內縛竪忍願如劍形名最勝轉輪印師説用智拳印祕祕真言唵摩訶縛曰路烏瑟尼沙吽怛洛頡哩惡吽娑婆賀勸請本尊聖者大勝尊蓮花部中諸聖衆禮佛句發願句大勝金剛正念誦呪本呪御加持本呪伴僧同字輪觀等經云十方淨妙國三世及三界最尊獨無比此大轉輪王能摧諸佛頂能攝諸等覺親近為眷屬速成大悉地若末法世人長誦此真言刀兵不能害水火不焚漂蓮花金剛手翼從而侍衛若誦一百八能滅百劫罪若誦一千遍能成滿意願若誦一洛叉得大金剛身若誦一俱胝得成遍照尊千佛來共護決定無有疑我今更説印金剛最勝心內竪十度縛忍願屈如頂是名根本心最勝轉輪印若常結此印金剛薩埵尊蓮花摩尼主毗首羯磨尊一切諸聖尊咸來增覆護此人如金剛諸惡不能壞此身如光聚能破三界冥此人如蓮花諸塵不能染此身如羯磨大作諸佛事身如遍照尊諸佛不能捨身如妙吉祥能成無盡惠身如金剛輪能轉理趣輪持此真言印能成如是事如依觸淨處但結最勝印及誦根本心一切無不為隨作皆成就一切願皆滿云云五大虛空藏息災增益天變所望辨事朱祕中深祕也馬頭種字三摩部主金輪又佛眼諸尊三十七尊皆入寶部三摩地各持虛空藏印一切義成就輪五部富貴吉祥法也印內五古印五峯皆想成寶珠但二中指作寶形云云祕祕説也真言如常唵縛曰羅囉怛曩鑁吽怛洛頡哩惡娑婆訶又印虛心合掌以空捻水中文以二風押空上真言如先通密印內縛二大指並立如鉤口傳云云真言如常又印如瑜祇經八天印可用之云云師主極甚祕云外五古印真言曰三寶院傳祕中祕説也五部肝心在之云云唵縛曰羅囉怛曩阿阿暗惡噁娑縛賀口授云振鈴之後五種印并甚深印可結之云云勸請句本尊五大虛空藏七曜星宿諸眷屬禮佛句南無法界虛空藏三返南無金剛虛空藏南無寶光虛空藏南無蓮花虛空藏南無業用虛空藏南無金剛界發願句本尊聖者五大虛空七曜星宿諸眷屬等兩部界會正念誦真言唵縛曰羅囉怛曩鑁吽怛洛紇哩惡娑縛賀御加持真言胎藏次第虛空藏院真言也師主為美福門院勤修之時用此助修八口也歸命南引一伊阿迦奢三曼多弩麼多尾質怛藍縛羅二合達羅娑縛賀伴僧呪次上真言用可用之云云三寶院前大僧正定海勤修之時用御加持并伴僧本呪云云先師此説不可用之云云御加持真言可用歸命鑁吽怛洛紇哩惡莎賀祕祕説也字輪觀阿縛羅訶佉字義順逆如常可觀之云云尤為吉云云從字輪觀出後先大日加持次本尊加持佛眼金輪孔雀明王等印言可用之云云今此法者通息災增益二種可修之為除災可修息災為壽福可修增益益也普通行時助修六口淨衣白黃或八口護摩壇許可修也是仁海僧正右行樣無小壇護摩壇許云云一圓明中可觀想鑁吽怛洛頡哩惡五種三昧耶形如瑜祇經説壇中央小塔安置奉篭佛舍利五粒或一粒是即虛空藏三摩耶身如意寶珠故也云云護摩時五段行之火天部主金輪佛眼本尊五大虛空藏諸尊三十七尊世天段世天段火天位增加杓可供十二天諸宿曜等三十六禽七星等同加可供之虛空藏結者虛空藏結之意也以黃色糸六尺許時別三十六結三時一百八結結線可令懸施主之身左合緒一返一結百返百結千返千結可送施主許云云師主云近來不用之結線呪可用歸命鑁吽怛洛頡哩惡娑縛賀云云或次第中又有結線呪云云口傳云祕中深祕金門鳥敏法者件年被修此法仍如此書之施主姓名并祈願意趣書注青紙黃紙等舍利塔之內或下可安置之極祕事也三十六禽呪可加誦但無本説歟以金剛界成身會可行之也五字轉成五佛次轉五佛成五菩薩云云振鈴之後五大虛空藏印明各別用之東方合掌唵縛曰羅吽南方寶印唵縛曰羅囉怛曩怛洛西方蓮印唵縛曰羅達麼頡哩北方金掌印唵縛曰羅羯磨惡中央金掌以二風押二空甲云云唵縛曰羅鑁次八天印可用之云云結如來拳印觀於己身前有無盡乳海海中出生大寶蓮花王金剛為莖量同法界上有七寶珍妙樓閣花香雲海伎樂歌讃摩尼為燈樓閣中有大圓明月輪等自身量於一圓中更分為五於中圓明有鑁字成法界虛空藏白色左手執鉤右手持寶前圓明中有吽字成金剛虛空藏黃色左持鉤右執寶金剛右圓明中有怛洛字成寶光虛空藏青色左執鉤右持三辨寶放大光明於後圓明中有頡哩字成蓮花虛空藏紅色左持鉤右持大紅蓮花左圓明中有阿字成業用虛空藏黑紫色左持鉤右持寶羯磨此菩薩戴首五佛寶冠衣服瓔珞皆依本色各結跏趺坐一曼荼羅內大威德諸尊圍繞恭敬云云息災先德次第不違本方云云右曼荼羅草案本二種在之在別泥塔供養佛眼大日印真言大日供養法也師主傳大佛頂法息災增益壇上有頡哩字成大蓮花王遍法界其上有惡字成寶宮殿高廣無中邊無數莊嚴充滿其內其中央有七師子座其上有白蓮花王其上有惡字變成金輪寶變成攝佛頂輪王身即大日也如來形紫磨金色大丈夫相也住法界定印其上持八輻花輪其上右旋現八色輪第一赤色輪有光聚佛頂左手持蓮花上有佛頂第二黃色輪有發生佛頂持黃色蓮花第三白色輪有白傘佛頂持白傘第四雜色輪有勝佛頂持利劍第五紅色輪有除蓋障持紅蓮上安鉤第六青色輪有黃色佛頂持三股杵第七緑色輪有最勝佛頂持金輪第八紫色輪有無邊音聲佛頂持白螺八兢沙俱胝諸佛圍繞其外女寶馬寶主藏神寶輪寶象寶珠寶兵寶四面圍繞如是觀如例加持七處師主云大佛頂是諸佛頂總名也攝一切佛頂輪王為本云云今用之或説云八大佛頂云大佛頂或説云五佛頂云大佛頂真雅傳也在小野祕密抄靈巖傳以白傘蓋為摩訶頂云云壇置十六鏡云云師主不審云云大理趣房云以金輪為摩訶頂云云此傳意種子勃嚕唵三金輪也人多用此説也大教院傳亦用之印智拳印大師御傳云云部主阿彌陀頡哩三蓮花獨股杵為莖云云師説云胎藏大日為本尊也種子惡三八輻輪部主阿彌陀三摩耶如先諸尊八大佛頂智拳印真言小呪印言外五大佛頂小呪率都婆真言口傳云云小呪曰醍醐傳云云曩謨引娑哆二合他引誐跢耶蘇誐跢引耶囉訶二合帝引三去藐三去沒引馱耶悉殿都曼怛羅二合跛娜引娑縛二合引訶同小呪勤修寺傳云云怛儞也二合他唵阿曩曬引阿曩引曬尾舍娜尾舍娜滿馱滿馱滿引馱儞滿馱儞吠引羅縛曰羅二合播引抳泮吒吽引𢻵啉二合引泮吒娑縛二合引訶同小呪加持物用之唵麼抳縛曰羅吽師主口傳云歸命惡娑縛賀時間伴僧誦陀羅尼御加持呪用小呪勸請句金輪佛頂轉輪王八大佛頂諸轉輪禮佛句如尊勝法讃四智又本尊讃云曩莫薩縛枳然野一摩妬悉尼二薩縛惹誐地三弩悉尼四野捨悉尾寧五方補縛弩迦曼多謎七三摩沙他八尾地野知波九捨迦羅摩利寧十曩謨率都帝十一怛羅他利捨迦羅縛里地曩謨率都帝字輪觀阿縛羅訶佉本説云本尊印言之次或可用八大佛頂八大菩薩八大明王印言但可隨時八大佛頂印言如胎藏八大菩薩印言胎諸菩薩印言普印也石山內供傳云八大明王一切持金剛印言金剛部三昧耶印也攝一切佛頂曼荼羅高野本師主被仰云右曼陀羅圖依於大妙金剛甘甘軍荼利經説歟但彼經説中央尊云爾時世尊身現作攝一切佛頂輪王之相手持八輻金輪處七寶師子座云云是法界定印上持金輪歟若爾可惡字今圖中央安鑁字如何可思之又彼經不言一身四面住智拳印如何石山內供大佛頂圖云中央攝一切佛頂輪王手持八輻輪種子惡字也云云尊勝儀軌不空譯并善無畏譯俱中央佛頂向西今經所説何向東乎答先德云此法部主阿彌陀云云以之思之此法可修敬愛歟仍彼經中央尊向東方即此意歟但先德此法增益或息災行之者相濫尊勝法歟安八大佛頂雖同尊勝法其行法不可同歟內供圖又以光聚安中央前東方畢八大明王印言第一大笑明王右空押地甲立肘左拳空風捻真言曰唵縛曰羅吒賀沙耶吽發吒第二步擲明王右手三古印向外左拳上肘真言曰唵紇哩𤙖矩嚕𤙖勃嚕𤙖素嚕𤙖惹嚕𤙖第三降三世明五二羽交臂金剛拳檀惠相鉤竪進力真言曰蘇婆儞蘇婆吽縛曰羅吽發吒第四大威德明王內縛立合二中指根本印如常真言曰唵吽惡吽第五不動明王鞘印如常真言曰阿左羅羯拏戰拏沙馱耶吽發吒第六無能勝明王右手捻空風安心左手立肘五輪向立外真言曰唵戶嚕戶嚕戰拏哩摩登疑娑婆二合賀第七馬頭明王二手作三補吒屈二風指合甲去空指根下稍一麥許不相著二空並立稍仰其甲頭即是也真言曰唵賀耶紇里縛吽發吒第八大輪明王小金剛輪印也真言曰唵嚩曰羅二合斫紇羅二合吽八大佛頂異名最勝金輪攝諸輪王無邊聲無邊妙響遍照光聚神通放光發生廣大大轉輪高佛頂破魔白傘蓋異相奇特勝佛無比尊勝除障捨除摧毀降魔摧碎廣生極廣最高難覩辨事黃色八大佛頂八大菩薩八大明王事小野略頌最勝觀音馬頭尊無邊慈氏大輪尊光聚虛空大笑尊廣大普賢步擲尊白傘金剛降三世勝佛文殊大威德尊勝除蓋不動尊極廣地藏無能勝師主云大妙金剛大甘露軍荼利焰鬘熾盛佛頂經運録分明説八大菩薩現作八大明王不可有異論但八大佛頂八大菩薩同體者本説何處乎答即彼經先説八大佛頂次説八大菩薩知是同也但其佛頂其菩薩同者彼經不分明歟雖然尊勝一卷儀軌不空譯中央佛右邊安觀自在菩薩次第右回地藏菩薩為第八又二卷儀軌善無畏譯中央佛右邊安最勝佛頂次第右回廣生佛頂為第八明知最勝佛頂即觀自在乃至廣生佛頂即地藏也五佛頂者出五佛頂及胎藏軌云云輪蓋高光勝金輪要略儀軌以之為五指名大指為輪也八大佛頂如常十佛頂者八大佛頂加攝一切佛頂及普通佛頂歟云云三佛頂者出胎藏軌并大日經發生廣生無邊音聲光明真言法本尊胎藏大日種子三昧塔部主阿彌陀印言金剛界三昧耶會云云諸尊三十七尊印外五印祕密印真言如常師主説云普通説以金剛界大日為本尊印言如常但此傳祕説云云加持物呪曩莫三曼多沒馱南阿娑婆賀蟻子丸事蟻冢土藥種用之此相應物也祕厚造紙上云魔醯首羅大自在天神通化生伎藝天女念誦法云有怨家以用朱砂書名形於左腳下踏自來云云夫婦相背者書其名不令知左足踏之即愛云云一切貴人愛入宮云云無垢淨光陀羅尼法明聞本尊阿彌陀部主觀音諸尊三十七尊以又御本重交一交了御本云建保六年二月十五日於遍智院以御本書了金剛佛子憲丨生年二十七建長二年五月六日賜極樂坊御本書寫之畢求法沙門顯成生年二十二校合畢
