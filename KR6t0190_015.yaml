body:
  text: 諸尊要抄第十五如法尊勝轉法輪地鎮鎮壇後七日晦御念誦加持香水寶生尊吉祥天馱都寶珠避蛇在別奧云砂子在別如法尊勝法天蓋空色幡皆黃色四角各二流中央一流合九流也中央幡三丈八流各九尺天蓋裏有輪三股銅薄也天蓋裏九輪百八造之每輪書尊勝陀羅尼仍總百八遍口授云塔長三尺許云云敷曼荼羅圖大壇不懸本尊上釣天蓋敷曼荼羅中央立塔安置舍利口授云或安置如意寶云云護摩壇懸延命但權僧正範俊依院宣奉為公家近年被行之日不懸尊像於護摩壇云云阿梨耶聖者烏瑟抳舍佛頂尾惹耶尊勝曩謨陀羅尼部主寶生本尊鑁三摩塔諸尊八大佛頂御加持真言時間伴僧念陀羅尼云云印彈指勢如次第陀羅尼鉤召如胎藏次第智拳印鑁率都婆陀羅尼祕中深祕云云乳木骨路草爪根也或柏木或用松木四角削之又用活路草烏瓜也每日香黑沈香白檀安息薰陸丁子已上可用丸香散香等多者可通諸壇若不足者限本尊壇檳榔子天門冬訶利勒人參桂心伏苓已上可用本尊壇藥種各別可盛之各三度供之十五日香藥沈白檀紫檀煎香已上四種香抹以蜜和一器可供之各三度可用匙安息丁子薰陸已上以蘇和一器可供之甘松寉香苓陵香已上以蜜和一器可供之乳頭香龍腦丁子已上香抹各可為丸香每香可加豆蔲白芥子右件香藥等諸壇丸香散香所可供云云沈白紫檀及煎香安息丁子薰陸已上每日甘松寉香苓陵香巳上丸香乳頭龍腦豆蔲散已上散香已上每日檳榔天門訶利勒人參桂心伏苓藥已上藥種支度卷數案在別已上如法尊勝法御本一本無之摧魔怨敵法本尊彌勒種子三摩耶形迅疾部主大輪金剛師主口傳云今此部主本尊壇可繫之云云諸尊五大尊印小金剛輪印言唵縛日羅二合斫羯羅二合吽弱吽吽鑁斛引已上小野傳本尊大輪金剛種子三摩輪部主降三世諸尊五大尊又圖樣奧在之印小金剛輪印本尊不繫之云云已上醍醐傳勸請句本尊聖者轉輪尊十六大護諸藥叉又説摧魔怨敵轉輪尊十六大護五千神禮佛句曩謨阿利耶斫羯羅縛曰羅怛洛發願句摧伏金剛本尊聖者摧一切魔轉法輪尊十六大護諸大藥叉部類眷屬五千神將外金剛部云云正念誦真言本呪御加持本呪伴僧委細口傳在之更有真言字輪觀等師説云大輪金剛彌勒忿怒身也二説無違但更云轉法輪菩薩法故彌勒菩薩為本尊甚勝云云件大輪形像在理趣會曼荼羅云云宗意説云部主大威德也云云師主傳也大妙金剛并法花儀軌以小金剛輪印為轉法輪菩薩印云云其證文云法花儀軌云然後結才發意轉法輪菩薩印二手各作拳二頭指二小指互相鉤即成按於壇上誦真言五返真言唵縛曰羅二合斫羯羅二合吽引弱吽鑁斛引文大妙金剛大甘露軍荼禮焰鬘熾盛佛頂經云爾時慈氏尊菩薩現作大輪金剛明王遍身黃色放大光明右手持八輻金剛輪左手拄一獨股金剛杵説是六字心真言唵縛曰羅二合左紇羅二合吽胎藏七集云石山記印相戒方進力相叉檀惠忍願禪智相合如輪三角光明焰禪智在頂乞歡喜是大金剛輪根本懺悔印真言如常右印明出本軌云云圖云肉色左手持蓮花其上安三股尊形立右膝坐赤色蓮花云云一説云銅筒其內想引入怨敵師説云等身書檀越形彼足下書怨敵姓名可篭彼銅中是小野極祕事云云或人云取等身事九寸云云是初生等身也云云師説云以椙為乳木又入藥種供之以十八道可行之尤四無量觀可加修之又祕説云散念誦時右手握金剛拳置彼銅筒上誦彼十字真言云云祕祕祕也地鎮口傳云小野記不築壇以前修之金剛賢瓶一口五寸入五寶等覆蓋以五色糸結之誦大日真言并地天真言然後埋之於本地以五色玉埋于地四方五穀粥二桶以甘露法味真言加持之一桶沃壇外一桶沃牆外四至即乞請地於諸神地主也二桶若不足者可及三桶云云鎮壇口傳云小野説次築壇建堂之後修之輪八枚橛八本埋壇八方輪中央穿穴入橛峯令戴立橛埋之也先自東方可埋之各隨本方誦八方天真言可埋之五穀粥二桶沃之作法如前粥地鎮鎮壇共用之已上前後兩度修地鎮鎮壇之儀也所謂地鎮埋瓶及玉不用輪橛鎮壇埋輪橛不埋瓶玉等也若前不修地鎮造畢堂舍之後一度行鎮壇者金銅瓶埋壇中心輪橛可埋八方玉不埋之云云近代多者別不修地鎮一度行鎮埋之云云供養法成身會又十八道供地天也云云輪圖輪八枚各輪中穴廣六寸云云橛八本各頭長六寸獨股云云長五寸可造之云云有蓋支度案等在別安鎮法在別後七日御修法有二種護摩壇息災增益也息災不動為本尊增益普通吉祥天為本尊云云師主極深祕傳云本尊如意寶珠部主寶生尊云云印言金剛界三昧耶印真言用之謂金剛外縛忍願合屈如寶形云云縛曰羅枳惹二合南怛洛二合壇上本尊宀一山勸請之一體無二云云已上今此流有此究竟祕事云云真言院晦御念誦事寶生尊真言用之如增益護摩云云本月一日修之總後七日御修法支度卷數并壇樣等在別正月十四日夜御藥加持香水作法香水機上二器也若阿闍梨參御齊之會時從布施堂諸僧相共參內裏不然之時威儀僧等相共參集右衛門陳集會弓場殿云云五股真言院自持之或以他人可令持之可然人持之云云諸僧皆著床子次阿闍梨立而持五股行寄香水機下長脆而坐但南殿之時乍立作法也次五股行香水器右後三部被甲護身次取五股加持右器二十一遍真言如常次加持左器又二十一遍又如常次取散杖漬水以覽鑁加持之各二十一遍後散杖置器上右器也次左又如此云云次先取右散杖三度灑御前奉灑聖主也次左取散杖先自身次灑諸卿及宮中此間五股左持之次右取五股總而逆順加持各三返而後於袖中持五股兩手上額少低頭閉目想宀一山如此觀念了後立著本床子云云或本云聖主御身一體無二御願成就可令祈不祥等事而御藥加持師主勤仕之其作法立少屈也還師主云於南殿立勤之也清涼殿時跪勤之也云云勸修寺僧正傳突左膝立右膝護身并加持二器灑水次雙膝俱突灑主上次如初突左立右自身諸卿法界灑之也小野傳突左膝護身等了次加持二十一遍即灑自身等次雙膝俱突灑主上次加持等云云寶生尊增益十八道或金剛界成身會可修之種子三摩寶珠部主吉祥天又大日諸尊三十七尊印左拳安臍右羽仰置膝上云云言唵囉怛曩二合三婆縛怛洛二合如意寶珠印以兩手相叉頭指相拄屈其大母指入於掌內相叉云云私云外縛也唵帝儒入縛羅薩縛羅他二合娑陀迦悉𠆙悉𠆙真跢摩抳囉怛那吽禮佛句發願句勸請句正念誦真言本呪字輪觀阿等入我我入觀次本尊印如先寶印如先次羯磨會寶波羅蜜印言印相如寶生尊同會寶菩薩印言二拳相合進力如寶形三摩耶會寶生尊印言同會寶波羅蜜印言印相如寶生尊同會寶菩薩印言次檀波羅蜜印言曰右手火空相捻仰當胸云云真言唵縛迦婆底怛那底婆帝毗娑利惹普羅耶娜難娑縛賀次毗沙門印言虛心合雙地入掌相叉二空竪並水火竪合二風屈火背一寸許不相著之唵吠室羅摩拏也娑縛賀次吉祥天印言八葉印唵摩訶室哩二合野曳娑縛賀次正念誦羯磨會真言次字輪觀阿縛羅訶佉次本尊加持次散念誦佛眼大日上十呪一字次後供養等作法如常散念誦數遍佛眼二十一大日百本尊千如意百餘皆百吉祥天讃二十一返一字百吉祥天增益付大法可修之種子三摩部主寶生尊根本印八葉印又印內縛三股印曩謨摩訶室哩耶提尾發願句吉祥天女勸請句正念誦本呪字輪觀阿等師説云正念誦之始先結定印觀念我心月輪上有室哩字遍體皆悉室哩字也此字變成摩尼寶珠我身又舉體如意寶珠也是珠身變成吉祥天女身也入我我入觀如大法也馱都法息災行之種子三摩馱都尊形釋迦金輪部主大日金界諸尊三十七尊印金輪印金剛界遍照尊印也祕祕言曩謨三曼多沒馱南唵步嚕唵勸請句本尊界會如來馱都金剛部中諸聖衆禮佛句曩謨沒馱舍利羅發願句如來馱都本尊可繫釋迦金輪中心安舍利塔云云或本在之香藥等口傳相傳云此法益末法衆生現世當生求願無不滿足次第口傳事等努力努力不可妄授非器衆生云云保延六年十二月十六日授申巳講了件鈔者勝具胝院僧都記寬命持本又異本在之如意寶珠法對東增益異本云本即彼主是南主種子阿三摩馱都馱都變成如意寶珠祕中祕密部主宀生諸尊三十七尊本尊印言以兩手相叉二頭指拄屈其大母指入於掌內相叉此印亦名大精進如意寶珠印即説祕密陀羅尼曰唵帝儒入縛羅薩縛羅他娑陀迦悉𠆙悉𠆙真跢摩抳囉怛那吽部主印言金本誓之印言也道場觀莊嚴珠妙寶壇之上有七寶所成寶臺珠鬘瓔珞圍繞懸列其寶臺之上有閻浮檀金白銀合成梵篋色相清徹威光赫赫其梵篋內有阿字放光明照法界此阿等變成圓滿月輪光明澄淨其色潔白此月輪中有如來陀都陀都變成如意寶珠香風匂天密雲覆空令生長萬物利益一切衆生水底陸地無不蒙利益耳香藥雄黃苟𣏌牛黃正念誦真言本呪字輪觀阿縛羅訶佉禮佛南無震陀摩尼發願句震陀摩尼勸請句本尊界會震陀摩尼寶部會中諸聖衆避蛇奧砂子在別傳法潅頂作法在別如法愛染在別異本在之此法異本如此書也仍私書入之如意寶珠去本即彼也主是南主諸三十七尊對東增益本印言以兩手相叉二頭指拄屈其大母指入於掌內相叉此印亦名大精進如意寶珠印即説祕密陀羅尼曰唵常儒入縛羅薩嚩囉他二合娑引陀迦悉𠆙悉𠆙真跢引摩抳囉怛那吽部主印言全本誓之印言也諸尊如常師主口傳云愚推云字變成馱都馱都成如意寶珠是私推也不可輒諸設耳祕密之中祕密也重以御本一交了御本建保六年二月二十七日於遍知院以御本書了金剛佛子憲丨生年二十七才一校了建長二年五月二十五日賜極樂坊御本書寫了求法沙門顯成生年二十二才校合了享保十五庚戌年三月十日書寫畢沙門信源元文三戊午年九月中旬於豐山月輪院從信源法印傳受畢沙門俊辨
