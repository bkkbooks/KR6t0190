body:
  text: 諸尊要抄第十北斗妙見北斗法第一貪狼星護子年人主黍桐米麥粟第二巨門星護丑亥年人主粟槐橙第三祿存星護寅戌年人主稻楡麥第四文曲星護卯酉年人主麥桑黍第五廉貞星護辰申年人主麻棗桑第六武曲星護巳未年人主大豆杏小豆第七破軍星護午年人主小豆杏麻子主色貪黒青赤巨白黒青祿同文同廉同武赤黄白破同七曜精貪日精或説月巨月精或水祿火精或金文水精或土廉土精或水武木精或火破金精或月東方七佛變出北斗延命經貪最勝世界運意證佛巨妙法世界光音自在佛祿圓滿世界金色成就佛文無優世界最勝吉祥佛廉淨住世界廣達智辨佛武法意世界法界遊戲佛破瑠璃世界藥師瑠璃光佛七當處貪當左目或額或左眼巨當右目或面祿當口或左眼文當鼻無或説廉當左耳脾或眼武當右耳脾或口破當主肝或頂配二十八宿貪室壁奎婁巨胃昻畢觜祿參井鬼柳文星張翼軫廉角亢氐房武心尾箕斗破牛女虚危指尾方正月戌時寅亥時卯子時辰丑時巳寅時午卯時未二月戌時卯卯時申三月戌時辰卯時酉四月戌時巳卯時戌五月戌時午卯時亥六月戌時未卯時子七月戌時申卯時丑八月戌時酉卯時子九月戌時戌卯時卯十月戌時亥卯時辰十一月戌時子卯時巳十二月戌時丑卯時午現虚空形九曜者亦名九執是云當年屬星并本命曜云云一日曜亦名大陽丑寅方二月曜亦名大陰戌亥方三火曜南方亦名熒惑星四水曜亦名辰星北方五木曜亦名歳星東方六金曜亦名太白星西方七土曜亦名鎭星季方八羅睺亦名黄幡艮方九計都亦名豹尾坤方或次第云火曜是名大將軍水是北辰木是帝釋金是増長天計是閻羅王又云日是歳徳水歳刑木歳殺土歳破羅睺阿修羅云云本地日觀音或虚空藏月勢至或千手火寶生佛或阿嚕迦觀音水微妙莊嚴身佛或水面觀音木藥師佛或馬頭觀音金阿彌陀佛或不空羂索土毘盧遮那佛或十一面觀音羅毘波尸佛計不空羂索降下日并衣色日二十七日白色月二十八日白色火十九日赤色水二十一日黒色木二十五日青色金十五日白色土十九日黄色羅八日青色計十八日月一日宿餘以之迴數可知之室正月一日奎二月胃三月畢四月參五月鬼六月張七月角八月氐九月心十月斗十一月虚十二月十二神七曜住師子亥日雙女戌日秤酉金蝎申火弓未木摩蝎午土寶瓶巳土魚辰木羊卯火牛寅金鬼女丑水蟹子月十二月師子正或六雙女二或七秤三或八蝎四或九弓五或十摩蝎六或十一寶瓶七或十二魚八或正羊九或二牛十或三鬼女十一或四蟹十二或五凡香隆寺指尾法云夫此七星上曜於天神下直于人間以司善惡而分禍福若有人能禮拜供養者於一生中無有横惡之事長壽富貴死籍削生札還著不信敬者運命不久貧窮多病卒大小便利及穢惡事並不得向北縁云云抑欲修此法者從月一日起首至月八日可爲一期宿曜經云白黒月七日北斗梵云七仙神云云下若念誦時結跏趺坐向北飮食時向北臥息時頭東面北所著衣服所用雜器供養物等皆白色矣所行之處王宮淨室河池海邊練若山谷之間隨意樂處可行之云云北斗七星護摩祕要儀軌云若有人能禮拜供養長壽福貴不信敬者運命不久爲供養者令其屬星數削死籍還付生籍云云北斗七星護摩法云一行撰修此護摩法者削於死籍記記長壽札神驗最明延命増算除災招富延命之法無如此者也云云護摩圖付金剛界可行之右初夜如此圖波拏七本幣七重錢茶菓各三盃佛供十一盃但上蝋燭立之後夜粥八盃備之事如常波拏幣錢茶菓子無之云云日中佛供十六盃汁八盃備之如常但大八盃小八盃合十六盃也菓子并波拏等無之云云左右脇机供物等如息災云云但五穀中除一種換命穀用之又乳木用命木云云又云本尊段七星并補星料重結花八葉可置二結勸請并奉送料也法務説也藥種杓𣏌白朮人參遠志黄青根加持物胡麻塗香散香丸香白檀龍腦白膠薫陸或茅香甘松用之護摩次第火天壇大日所變故以阿字爲種子印眞言如常部主段以一字金輪爲本尊釋迦金也三摩耶形印眞言如常本尊段各別種子尤善利根人可用之三摩耶形星形但本命星爲中央餘六爲伴印眞言召北斗印言也諸曜宿段土曜爲中央餘八爲伴次十二宮次二十八宿迴圓可勸請之或通字大鉤召印言用之但供物之時諸宿曜明眞言用之世天段或十二天通用字印眞言如常供物呪事火天段如常部主段翻經院眞言本尊段北斗總呪尤吉又本命星本眞言餘總呪云云諸曜宿段唵盧伽盧伽迦羅耶娑縛訶此眞言通用之云云世天段如常加持物北辰心呪用之正念誦金輪眞言用之翻經院説也次北斗總呪師説也加持物呪唵素底里瑟陀娑縛賀伴僧呪召北斗眞言用之念誦次第佛眼大日金輪召北斗當年星九曜十二宮二十八宿御加持眞言召北斗云云醍醐流本尊加持召北斗眞言爲宗勸請一字金輪轉輪尊北斗七星諸曜宿禮佛句曩謨怛羅訶迦多婆曩迦瑟多羅但醍醐流云云師主口傳振鈴之後蝋燭付火承仕或自行之次先金輪印言次召北斗印言并諸曜宿等印言用之次事供養也云云道場觀壇中有惡字變成七寶莊嚴宮殿其中有紇哩字成寶蓮花臺臺上有字轉成金輪佛頂其後邊左右有七惡字成荷葉座座上各有盧字即成北斗七星前有荷葉座座上土星次日月火水木金羅計十二宮神二十八宿三十六禽并諸眷屬等重重圍繞矣云云種子三摩一一可觀之印眞言曰召北斗印翻經院儀軌説但香隆寺次第相違云云虚心合掌以二大指捻二無名指甲二中指二小指蓮葉二頭指少開屈來去云云師説也眞言如常云云北斗總印一行儀軌説出於阿陀密經云云左右二火二空相係捻之二水合指前面二地二風張立即成眞言總呪也或説印二羽内縛二頭指端竪合即成云云眞言總呪七星印本命供次第説也各皆用金剛合掌云云又印香隆寺并宿曜供次第説各別眞言用此印云云二手合掌二風二空極相開之九曜總印護摩次第七曜印用之云云先合掌十指相著二風二空極相開云云七曜總印云虚心合掌二大指外縛云云七曜九執十二宮神印延命院説定惠團而端合二空退竪合當心也云云二十八宿總印先虚心合掌二火外相叉二空亦相叉云云眞言如常云云十二宮總印次上延命院説同云云總呪無之三十六禽印二手内縛二風空端合彈指云云眞言如常云云十八道行之別尊次第也金輪爲宗故入我我入觀并字輪觀尤行之正念誦等作法如常云云北斗供圖師説今此北斗供三時行之初夜佛供十一盃上蝋燭立之波拏七本錢三盃茶菓子各三盃弊七重如圖備之後夜粥三盃日中佛供三盃汁三盃也菓子無之今圖樣師主爲顯長參川守令行御所也於佛供者令付香隆寺次第云云法務説云佛前四盃並置之次三盃並今四盃四角各一盃備之云云本命供三時行之當年屬星供一時行之若本命供時七星爲中央右端爲曜左端爲宿若屬星供時曜爲中央七星爲右端宿如前耳三位中各雖有諸星本命星當年星等爲本可供之供養法次第壇前普禮著座普禮塗香三密觀淨三業三部被甲加持香水加持供物覽字觀金剛起金剛持遍禮普禮神分等初表白五悔發願五大願普供三力四無量觀勝願大金剛輪地結四方結道場觀大虚空藏三力偈小金剛輪送車輅請車輅召北斗印言九曜總印言二十八宿總印言大鉤召印言拍掌結界金剛網火院大三摩耶閼伽荷葉座振鈴理供養事供養讃普供養三力懺悔頌祈願禮佛佛眼加持次入我我入觀本尊印明等正念誦等字輪觀佛眼大日本尊散念誦法施祈念理供養事供養讃普供三力祈願禮佛迴向普賢行願解界撥遣三部被甲出堂道場觀觀壇上有惡字成七寶莊嚴宮殿其中有惡字成荷葉座可隨星座上有種子字變成星形星形變成其星等云云念誦遍數但本命當年星之時念誦此定可用之耳佛眼眞言二十一遍大日眞言百遍一字金輪百遍翻經院白衣八字妙見召北斗千遍翻經院北斗總呪百遍一行軌説九曜總呪百遍十二宮總呪百遍二十八宿眞言百遍胎藏瑜祇經三種眞言各百遍本命星當年星本命曜本命宿本命宮炎魔王以上各百反心經二十一卷八不偈二十一遍星供圖小野説幡立之二捧相重各置之久安五年十一月一日以法務本書之了云云師口授云北斗供時幡幣錢如此圖至佛供者十一盃也如香隆寺指尾法蝋燭立之云云壇樣依師説圖之口傳著座著禮三密觀淨三業三部被甲護身等如常加持香水加持供物金剛起普禮表白神分等如常四無量觀勝願大金剛輪地結四方結道場觀合掌觀虚空有吽字變成三味耶形三昧耶形變成北斗七星七曜九執二十八宿如來拳印加持七處又説云結如來拳印壇上有惡字變成寶宮殿宮殿内中央七惡字成七荷葉座座上有盧字變成三摩耶形三摩耶形變成北斗七星相好圓滿次其宮殿右方七曜九執十二宮神左方二十八宿三十六禽可觀之種子三摩耶座等隨位可觀之次以印加持七處云云大虚空藏小金剛輪送車輅觀念如常請車輅大鉤召召請北斗九曜十二宮二十八宿三十六禽虚空網火院示三昧耶閼伽荷葉座五供理供事供讃普供三力偈祈願禮佛次本尊加持佛眼大日金輪召北斗北斗總印九曜十二宮二十八宿散念誦眞言可隨便宜也次法施心經八不頌法身偈等如常八不頌云不生亦不滅不常亦不斷不一亦不異不來亦不去法身偈諸法從縁起此法隨縁滅如來説是因是大聲聞説次後供養作法等如常讃普供三力祈願禮佛迴向五悔解界撥遣三部被甲等如常次出堂北斗七星七曜九執十二宮神二十八宿各皆有別種子總種子有二説一説云吽字二説云盧字或次第云北斗總種子盧字九曜總種子哦字云云諸星種子印眞言北斗印眞言翻經院儀軌注説虚心合掌以二大指捻二無名指甲二中指二小指蓮葉二頭指小開屈來去云云曩謨三滿多那羅曩翳醯枳頗伊賀伊那伊迦伊羅伊謨羅多羅伽羅含娑縛賀又印明一行儀軌説出阿陀密經左右二火二空相係捻之二水合指前面二地二風張立即成唵颯多而曩野伴惹密惹野二合染普他摩娑二合縛弭曩名位羅紇山二合婆縛都娑縛賀或説印眞言如一行説二羽内縛二頭指端竪合即成七星各別種子印眞言本命供次第云各皆用金剛合掌云云香隆寺次第云二手合掌十指相著二風二空極相開之七星各用此印貪狼星呪唵陀羅尼陀羅尼吽巨門星呪唵倶嚕陀羅吒吽祿存星呪唵波羅多伽吽文曲星呪唵伊利陀羅吒吽廉貞星呪唵吐吒羅尼唵武曲星呪唵誐都嚕吽破軍星呪唵婆娑陀含吒吽已上香隆寺傳總種子貪眞言曰南智羅布星二合尼迦曳娑縛賀巨眞言曰南多羅多羅賀尼娑縛賀祿眞言曰南迦迦迦迦哩賀哩賀夜利尼娑縛賀文眞言曰南鉢羅鉢羅婆夜羅婆夜羅尼娑縛賀廉眞言曰南迦迦迦哩賀哩賀夜唎尼娑縛賀歸命到力力迦左引哩賀夜哩尼石山眞言集此言武眞言曰南到到力力迦迦左哩賀哩賀夜哩尼娑縛賀破眞言曰南婆底多羅婆底婆利婆利摩訶婆利左利尼娑縛賀已上小野傳九曜總種子印言字或字總印先合掌十指著二風與二空極相開云云或本命供次第云云七曜總印虚心合掌二大外縛云云又云通印用合掌二大立來去云云又云定惠端合二空退立當心云云又云定惠手相合離火輪云云總呪歸命唵蘖羅二合醯入縛哩二合耶鉢羅鉢多儒胝羅摩耶娑縛賀各別種子印眞言羅睺星印定惠堅固合雙建二空輪竪同於幢眞言唵羅引戸曩阿素羅羅惹野塞摩捨都曩野若名位扇底迦哩娑縛賀唵遏羅虎耶娑縛賀土曜印地天鉢印唵捨泥殺儞二合羅曩乞殺二合怛羅二合跛羅二合訶引摩曩引嚕婆野若彼名位普瑟底迦里娑縛賀唵捨禰始戰羅始制二合帝室哩二合摩賀三摩曳室哩娑縛賀唵計曳耶娑縛賀水曜印二羽内縛竪合二頭指水天印也唵母馱曩乞殺二合怛羅二合娑縛二合弭曩名位契拏摩娑縛賀唵沒馱室哩二合娑縛賀金曜印二羽内縛舒立二中指叉但惠中指稍屈之唵戌上羯羅二合誐馱縛二合羅縛二合邏惹野若彼名位室利二合迦里娑縛賀唵戌羯羅二合室利二合娑縛賀日曜印合掌風以下四指頭相拄前二力大開以二空頭各拄水下節曩謨囉怛羅怛羅野引耶曩莫素哩野薩縛曩乞灑二合怛羅二合囉惹野唵阿謨伽寫野名位設底娑縛賀唵阿儞底耶室利二合娑縛賀火曜印右手五指直立相著屈空納著掌中風屈中節相招唵阿誐羅迦嚕儗野名位娑縛賀唵阿儗羅迦室哩二合娑縛賀計都星印羅睺星印也唵縛曰羅二合計都曩引曩乞殺二合怛羅二合囉惹野名位吽娑縛賀唵計都曳室哩娑縛賀月曜印右手作拳安腰左手五指相著竪之少屈甚高少許過肩即成蓮華中想有潔白月唵戰上怛羅二合曩乞灑二合怛羅二合囉惹野名位設底娑縛賀唵素麼室哩娑縛賀木曜印鉢印眞言唵引婆羅二合訶薩鉢二合底曩摩比跢縛曩二合野若彼名位摩攞縛羅馱引寧娑縛賀唵沒羅賀沙麼二合底室哩二合娑縛賀已上小野但初眞言出七曜攘災上卷云云二十八宿種子印眞言總種子又字總印先虚心合掌二火外相叉二空亦叉云云胎藏次第并宿曜供次第説本命供次第云堅固合掌二火二大指各外縛云云總眞言歸命唵諾乞灑二合怛羅二合涅蘇那儞曳娑縛二合賀各別種子眞言諸家次第用總印角唵質多羅娑縛賀亢唵薩婆二合底娑縛賀氐唵毘釋訶娑縛賀已下西方房唵阿㝹羅他薩婆賀心唵折沙他娑縛賀尾唵牟藍娑縛賀箕唵弗婆娑他娑縛賀斗唵欝多羅莎陀娑縛賀牛唵阿毘止娑縛賀女唵沙羅婆那娑縛賀已下北虚唵但儞瑟吒耶薩縛賀危唵捨多毘沙娑縛賀室唵弗婆跋陀羅娑縛賀壁唵欝多羅跋陀羅娑縛賀奎唵離婆底娑縛賀婁唵阿離尼娑縛賀胃唵婆羅尼娑縛東昻唵基栗柯娑縛賀畢唵戸盧喜尼娑縛賀觜唵麋梨伽尸羅娑縛賀參唵阿陀羅娑縛賀井唵不捺耶婆修娑縛賀鬼唵佛沙娑縛賀柳唵阿沙離沙娑縛賀南星唵訶可娑縛賀張唵雨頗娑縛賀翼唵求尼娑縛軫唵訶莎多娑縛賀十二宮種子印眞言總種子又總印定惠堅固合雙建二空輪竪同於幢云云殘十一宮印皆用之小野僧正傳也本命供次第云堅固合掌二大指來去云云十二宮無別總呪仍一一眞言可用之師子歸命係呵婆多曳娑縛賀雙女歸命迦惹婆多曳娑縛賀秤歸命兜羅婆多曳娑縛賀蝎歸命毘利支迦婆多曳娑縛賀弓歸命檀㝹婆多曳娑縛賀摩竭歸命摩伽羅婆多曳娑縛賀寶瓶歸命鳩槃婆多曳娑縛賀魚歸命彌那婆多曳娑縛賀羊歸命彌沙婆多曳娑縛賀牛歸命毘梨沙婆多曳娑縛賀男歸命彌偸那婆多曳娑縛賀蟹歸命羯迦吒婆多曳娑縛賀三十六禽印眞言二手内縛二風空端合彈指唵阿詣羅阿詣羅僧伽羅僧伽羅娑縛賀此法所用諸尊眞言等佛眼眞言曩謨婆誐縛妬烏瑟抳二合沙唵嚕嚕蘇普嚕入縛二合羅底瑟吒悉多嚕舍儞薩縛囉多薩多儞曳娑縛二合賀同小呪唵沒駄嚕遮尼娑縛賀大日眞言唵阿尾羅吽欠一字金輪曩謨三曼多陀羅陀羅波奢羅吽白衣眞言唵濕吠帝濕吠帝半拏羅縛引悉儞娑縛二合賀八字文殊唵引阿引入味引羅𤙖引佉左洛妙見眞言唵素底里瑟駄娑縛賀召北斗眞言曩謨三曼多那羅曩曀醯枳頗伊賀伊那伊迦伊羅伊謨羅多羅迦羅含娑婆二合賀引北斗眞言唵颯跢而曩野伴惹密惹野染普他摩娑縛二合弭曩羅紇山二合婆縛都娑縛賀九曜總呪唵蘖羅二合醯濕縛里二合野鉢羅二合鉢多儒低羅摩耶娑縛二合賀二十八宿眞言唵諾乞灑二合怛羅涅蘇那儞曳娑婆二合賀金剛吉祥成就一切明誦三百遍唵縛曰羅室利摩訶室利阿禰底也室利日素摩室利月央誐羅迦室利火水沒羅賀沙跛底室利木戌羯羅室利金舍儞始者羅始制帝室利土摩訶三摩曳室利娑縛二合賀妙吉祥破諸宿曜明通百遍唵薩縛多羅三摩曳室利曳娑縛賀成就一切明誦百三七遍唵一吒吒引吒烏短聲二合置智置智吒烏短聲三二合吒烏短二合吒烏引吒烏短二合四縛曰羅二合薩怛縛二合五惹吽鑁斛六紇哩二合鶴吽泮吒七吽八妙見法樓閣中有荷葉座座上有字變成星印印變成妙見菩薩左手持蓮花花上作北斗七星形右手作説法印五指並舒向上以大母指捻頭指側手掌向外天衣瓔珞珥璫環釧莊嚴其身五色雲中結跏趺坐眷屬圍繞云云讃孔雀經讃也根本眞言唵穆祇帝怛素吒印右手作施無畏屈大指向身招之三度左手作金剛拳安腰云云奇妙心眞言唵素涅哩瑟多娑縛賀又印寶部光菩薩印也先施無畏眞言又向内又八葉印又被甲印唵摩訶室利曳怛里吠娑縛賀以又御本重交了一交了建長二年六月三日賜極樂房御本書寫了求法沙門顯成生丨二十二丨校合了
