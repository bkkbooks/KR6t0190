body:
  text: 諸尊要抄第八不空羂索葉衣白衣大白衣多羅菩薩毘倶胝滅惡趣尊圓滿金剛法不空羂索二臂經第二四臂經十五三面六臂八卷八三面十臂經十三十八臂二十十一面三十二臂經十三卷種子經三摩羂索部主馬頭又正觀音諸尊三十七尊又六觀音根本印二手蓮花合掌進力禪智金剛縛右手禪度入左手虎口中理谷傳皆同之但不用云云師之説也眞言曰唵跛都麼達麼阿謨迦惹野寧素嚕素嚕娑縛賀不空羂索心眞言曰三卷不空羂索經上名不空陀羅尼自在呪願祕鈔有云以此呪名決定成就眞言云云唵阿謨伽波羅底訶帝莎訶師説云用蓮花印謂蓮花合掌也隨作事成就呪不空羂索自在王呪經上卷出云云唵阿暮伽毘闍耶𤙖泮吒加持物用之隨作何事若誦此呪悉皆成就云云師主口傳云今此呪用此不動獨古印祕祕説云云此法衆物以此印呪可加持之云云凡二呪皆可用蓮花印云云若欲得破壞怨家者木畫彼形並名字以脚踏之可加持印眞言彼也八臂像通用玄奘譯經云畫作觀自在菩薩似大自在天經一流志云如法圖畫不空羂索觀自在菩薩如大自在天云云十一面經疏溜淵云不空羂索經曰是觀自在菩薩乃現八手而被鹿皮又曰千手千眼大自在王十一面觀自在菩薩此菩薩或現大自在天身故現此身也師説云寶志和尚現不空羂索身有八臂南圓堂像亦然也近代世間所畫作皆八臂寶志遷化時現六觀音身可見彼傳云云勸請句不空羂索觀世音蓮花部中諸聖衆禮佛句南無阿利耶謨伽波奢發願句等引金剛正念誦眞言成就呪御加持并伴僧字輪觀阿等觀世音菩薩説不空羂索神呪之時現此形故名不空羂索觀音也云云經云身無衆病安穩快樂一切惡鬼一切怨家速滅不來壓魅呪咀不著身諸善神常隨衞護福壽増長所作皆成云云南圓堂樣在別但一面三目八臂先二手當心蓮合歟次左手索右白拂次左上索次右軍持也次又三面六臂左第一蓮花第二索第三三戟叉右第一瓶第二施無畏第一揚手也又祕本在別葉衣觀音圖云肉色左手垂下持索右手當乳持如意幢立左膝座赤蓮花或本坐白蓮花云云葉衣觀自在經云左手持羂索右手仰施願或吉祥菓持云云種子三摩吉祥菓又鉞斧又未敷蓮花又羂索部主聖觀音諸尊六觀音印八葉印師説也通印合掌右押左是也眞言曰唵鉢羅二合拏捨縛里吽發吒勸請句本尊界會觀世音蓮花部中諸聖衆禮佛句曩謨阿利耶波羅拏奢縛里又説句曩謨阿利耶波麗奢縛里發願句異行金剛正念誦眞言本呪御加持并伴僧同字輪觀阿等鎭法在別白衣觀音或息災種字三摩白蓮花小野部主聖觀音又馬頭諸尊六觀音又三十七尊印金剛合掌眞言曩謨囉怛曩二合怛羅夜引二合野曩莫素摩薩羅縛諾乞灑二合怛羅二合邏惹野者地波阿去引路加羅野怛儞也他唵弩摩底跛弩摩底薩賓上儞佉娑縛賀或説種子三摩鉢曇摩花部主聖觀音諸尊六觀音印内縛二頭指圓相拄出十一面軌中卷云云言唵濕吠帝濕吠帝半拏羅縛引悉儞娑婆二合賀出同軌禮佛句南無半拏羅縛悉地出同軌下卷發願句離垢金剛勸請句本尊界會白衣觀音蓮花部中諸聖衆正念誦呪本呪御加持呪并伴僧同字輪觀阿等御本云無指儀軌次第或説以葉衣觀音即爲白衣或師以白處尊爲白衣或説用蓮花部母者即此也不空羂索經八云白衣觀音母菩薩左手搏脇髀上仰掌執不開蓮花右手側揚掌半跏趺坐云云如意輪經云白衣觀世音母菩薩云云第九云白衣觀世音母菩薩左手執開蓮花右手仰伸臍下半跏趺坐云云又云白衣觀世音母菩薩左手執蓮花右手仰伸髀上半跏趺坐云云第二十二云次半拏羅婆徙儞白衣觀世音菩薩手執蓮花云云胎軌云白處尊髮冠襲純白鉢曇摩花手云云大日經疏第五云半拏羅縛悉寧譯云白處以此尊常在白蓮花中故以爲名亦戴天髮髻冠襲純素衣左手持開敷蓮花從此最白淨處出生普眼故此三昧名爲蓮花母也云云或師云白處者白衣是也唐摺本寶冠之上覆白繒左右之端垂肩上驗知不空羂索經第八九二十二三十并云白衣觀世音母又皆有半拏羅婆徙儞之句又十一面軌白衣眞言有半拏羅縛悉儞之句而大日經疏云半拏羅縛悉寧譯白處云云大白衣種子三摩開敷蓮花部主聖觀音諸尊六觀音印二手内相叉進力二度合竪微開禪智並立眞言曰唵摩訶鉢頭迷濕廢璫倪虎嚕虎嚕娑婆二合賀又云曩莫三曼多沒駄南薩娑婆賀禮佛句阿梨也豪黎阿微地也發願句放光金剛常淨金剛多羅菩薩種子三摩青蓮花已開却合部主正觀音諸尊六觀音印二手内縛進力並申合拄禪智並立言唵多利咄多唎咄唎娑縛賀禮佛句曩謨阿利耶多羅發願句悲生金剛正念誦本呪御加持呪伴僧同字輪觀阿等已上多羅法有端重言無用歟隨又御本無之毘倶胝種子又毘里三摩數珠鬘部主聖觀音諸尊六觀音印如多羅但二風交竪也言唵娑羅娑羅惹曳娑縛賀禮佛句阿利也毘哩倶胝發願句降伏金剛定惠金剛除障金剛正念誦本呪御加持并伴僧同字輪觀阿等滅惡趣尊向北修之滅罪種子三摩幢寶珠部主尊勝諸尊三十七尊印鉢印言訶訶訶素多睹娑縛賀根本印定惠爲拳開竪二中指眞言曰唵訶訶訶尾三摩曳娑縛賀口傳云幢菩薩印用之金剛界眞言本呪云云正念誦呪曩莫薩麼吒沒駄南阿弊毘庾反多羅二合尼薩怛縛二合駄敦娑縛賀勸請句本尊界會地藏尊寶部會中請聖衆禮佛句阿利耶乞叉底蘖婆發願句悲願金剛加持物胡麻藥種枸𣏌保元四年始自正月三十日五七日勤修此法之美福門院鳥羽院御祈令修之御者也圓滿金剛法増益聖賢闍梨説云云種子三摩甘花盛器印言如胎藏云云右手仰掌屈忍度與禪度相捻餘度皆舒唵婆去誐嚩無可反底丁以反娜引曩地跛帝尾沙㗚二合惹引布羅野娜引難娑縛賀由結此印誦眞言三返即滅無量劫慳悋業種獲得三種施福所謂資生施無畏施法施即檀波羅蜜圓滿現生獲得富饒資縁具足心得自在壽命長遠云云千手軌可見之祕説云種子怛洛三寶珠印言知先云云以又御本重交了一交了御本云建保六年二月十三日於遍智院以御本書了金剛佛子憲丨生年二十七建長二年五月十五日賜極樂房御本書寫之畢求法沙門顯成生年二十二校合了
