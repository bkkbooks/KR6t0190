body:
  text: 諸尊要抄第九五大尊不動息災調伏種子三摩智劍又説三形索勸請印本印又大鉤召或説法三御子傳祕祕説也三形倶力迦羅部主降三世諸尊段四大明王正念誦慈救呪御加持慈救呪加持物呪一字明根本印獨古印也火界呪劍印慈救呪外五古印慈救呪三三摩耶攝召印言祕祕又印口傳在之勸請句本尊聖者不動尊四大八大諸忿怒禮佛句大聖不動威怒王梵號南無阿里耶阿遮羅曩駄微地也囉惹密號常住金剛召請次第金剛藥叉降三世北本尊大威徳軍荼利師主口傳云五大尊行調伏之時三摩耶形智劍也又通用慈救呪攝五大尊事曩莫三曼荼縛曰羅二合赦戰拏北方金剛藥叉暴惡摩訶引嚧灑拏東方降三世忿怒娑頗二合吒耶南方軍荼利恐怖主吽怛羅吒西方大威徳唅𤚥中方不動能成事業三三摩耶攝召印言曰師主説也謂三三摩耶者是底哩三昧耶也梵云底哩唐云三梵云三摩耶唐云平等今云三三摩耶攝召者准大日經從初發心乃至成佛位位常有三法成就一除障相應二相續不斷三究竟成就亦證三身三寶三事初後平等故名三平等法若不具足此三平等則有障起間斷不成就三事不至菩提故此法中以是三三摩耶攝召印明從初發心乃至成佛攝召明王永不捨離纔結印明長得成就其印明金剛堅固内相叉檀惠竪開所生印此印名爲功徳母佛法僧寶住其中明曰曩莫薩縛沒馱母地薩怛嚩二合南阿莽囉尾迦羅多帝爾儞阿羅逝娑婆二合訶善無畏云此三三昧耶除障相應相續不斷究竟成就是大日經三句結要菩提心爲因大悲爲根方便爲究竟之義也師主口傳受此印云二手金剛外縛左右二小指立之大指並内入之云云八千枚乳木燒之事先三春最初甲子日取木若忽不可修之者件日取始置之至于殘者不論日時取之無咎長八指但師説云八寸削之正燒之時千枚燒之了次以小杓三度供飯雜供次芥子一度供之如此一返了又燒千枚飯芥子如前如此而八箇度燒之芥子返數多少任意師説云以千返爲吉云本尊段百八支乳木之所燒之例百八支不用之前供養已後讃普供養三力偈祈願禮佛次十四根本印言次十九布字等次佛眼印明次本尊印明次入我我入觀次本尊印明等次正念誦等如常口傳云振鈴之後率都婆印眞言一字明次法螺印二手三補吒改二空出風火間眞言曰曩莫三曼多沒駄南暗次理供養印明等如常結定印入本尊觀其眼如眠少許開視是入定相也入火生三昧自身成無動尊謂本尊與我一體無二一此尊大日化身花臺久已成佛以本願故爲如來使者執持諸正務也二明中阿嚕含𤚥四字三世諸佛皆從此四祕密應現三身菩提樹下降魔成佛是寂滅定不動義也三常住火生三昧覽字智火燒一切障成大智火四現童子形身卑肥滿表上承佛勅給使行者下化衆生接持雜類者五頂有五莎髻表轉七覺分法六左垂一辮髮表垂一子慈悲七額有皺文形如水波表憶念六道隨趣多惡八閉左一目開右一目表掩蔽左道令入一乘九下齒喫上右唇下左唇外翻出表以慈悲力用令怖魔羅十緘閉其口表滅衆生生死戲論語風十一右手執劍表殺害衆生現在三毒煩惱十二左手持索表繋縛不降伏者以利惠劍斷惑業令引至菩提十三喫行人殘食表噉盡衆生未來無明習氣也十四坐大盤石表鎭衆生重障令不復動使成淨菩提心如妙高山王十五色醜青黒表調伏無明十六奮迅忿怒表威猛相十七遍身迦樓羅焔表智火金翅鳥王噉食惡毒有情龍子十八變成倶力迦羅大龍繞劍表智龍火劍摧滅九十五種外道龍火十九變作二童子給使行人一名矜迦羅恭敬小心者表隨順正道者二者名制吒迦羅恐諸惡性者表不順違正道者也十九布字觀定印也此眞言末各種子十九加之也曩莫薩縛怛他蘖帝毘藥二合薩縛目喫毘藥薩縛他引唵婀左羅賛拏頂歸命頭歸命垂髮歸命額歸命先右耳次左耳歸命右眼左眼歸命鼻歸命口歸命舌歸命兩肩歸命喉歸命兩乳歸命心歸命臍歸命兩脇歸命腰歸命兩髀歸命兩膝歸命兩足十四根本印別在之左脇降三世金剛藥叉右脇軍陀利大威徳鎭法在別降三世四面八臂種子三五古祕智劍部主不動諸尊四大尊根本印二羽忿怒拳檀惠背鉤結進力二度背竪又印外五古印師主口傳云先二手各覆膝上次各仰後如例印結之云云究竟祕事也大谷覺俊傳云云眞言曰唵蘇婆儞蘇婆吽蘖哩二合訶拏蘖哩訶拏吽蘖哩訶拏婆耶吽阿曩野斛引婆誐梵嚩曰羅二合吽泮吒正念誦本呪伴僧并御加持呪曰同上勸請本尊聖者降三世四大八大諸忿怒禮佛南無嚩曰羅蘇婆儞尾儞耶囉惹發願最勝金剛字輪觀阿等五重結護在別軍荼利一面三目上齒喫下唇上牙向下頂上有髑髏八臂第一兩手相交在前右第二垂掌向外第三屈前拳舒頭指第四屈上五古左第二三古斧第三三古鉾第四金剛輪左足膝屈引擧右足直踏蓮遍身有蛇道場觀四臂四面也種子三摩三古智劍部主不動諸尊四大明王根本印二羽各作三古印右押左相交腕眞言曰阿蜜利帝吽發吒又根本印内三古印眞言曰曩謨羅怛曩怛羅二合衣也曩摩室戰二合拏摩訶嚩曰羅二合倶路二合馱也唵戸嚕戸嚕底瑟吒底瑟吒滿馱滿馱賀曩賀曩阿密利帝吽發吒此印明本儀軌説也正念誦本呪伴僧并御加持同勸請甘露軍荼利大明王四大八大諸忿怒禮佛句南無嚩曰羅軍荼利毘地耶囉惹發願句甘露金剛字輪觀阿等大威徳種子三摩棒智劍部主不動諸尊四大明王根本印二手内相叉作拳竪二中指相合同本尊身用大呪心印如前根本引舒二頭指屈當火背不相著所作事業速成就眞言曰唵紇哩二合瑟室利二合尾紇哩二合多引娜曩吽薩嚩二合設吐論二合娜捨也薩擔二合婆也四薩擔婆也娑發二合吒娑發吒娑縛賀心中心印如前心印但二風直火背不相著眞言唵瑟致利迦攞嚕跛吽欠娑縛賀師主口傳云本三摩耶形棒横伏其上立劍觀之究竟祕祕也住定印先頂上唵字口上惡字腰上吽字可觀之祕祕云云勸請句焔鬘特迦大明王四大八大諸忿怒禮佛句南無縛曰羅焔曼徳迦毘地耶羅惹發願句持明金剛字輪觀阿等金剛藥叉三面正面五目左右面各三目三面皆開口上唇有牙六臂右第一手執五古第二箭第三劍左第一鈴第二弓第三金剛輪左足直踏蓮右足引擧踏蓮敬愛修之種子三摩羯磨輪智劍部主不動諸尊四大明王根本印二無名指二中指内相叉二小指曲如鉤進力及禪智曲如笑眼眞言曰唵摩訶藥叉縛曰羅二合薩怛嚩二合弱吽鑁斛鉢羅二合吠捨吽師主口傳云種子三摩智劍印言用金剛合掌祕祕説也唵吒枳吽娑破吒二合鉢羅二合吠捨耶吽發吒引勸請句金剛藥叉大明王四大八大諸忿怒禮佛句南無縛曰羅藥叉毘地耶囉惹發願句字輪觀阿等二十五輪在別以又御本重交了一交了御本云建保六年二月十二日於遍知院以御本書了金剛佛子憲丨生年二十七建長二年五月二十八日賜極樂房御本書寫之畢求法沙門顯成生年二十二校合了
