body:
  text: 諸尊要鈔第十四護摩雜要護摩雜要打橛眞言四百遍唵虎嚕虎嚕吽泮塗壇眞言唵縛曰羅儗婆掃壇上掃地眞言唵賀羅賀羅祖紇羅二合賀羅拏野娑縛賀神線眞言唵地哩地哩微麼羅迦里吽吽泮吒作壇作法以鍬印加持土其印明内縛立進力禪智明曰唵儞佉那縛蘇提娑縛賀次和嬰麼夷香水等成泥次馬頭印明一百八遍加持之如常塗壇已五色糸橛等如常次二器香水如常次地結四方結如常次覽字觀如常次從驚發地神至于持地等如常次五供印明普供養等次地神眞言百八遍若二十一遍本部三字半字眞言百八遍先師傳也阿闍梨開白之次先行之云云又御本有之又説云次地天眞言可造立想地下金剛際諸瓦石糞穢之物取捨又惡鬼等諸障難人等悉避除以不動眞言百八返次降三世次馬頭次地結次大金剛輪各百八返已上大谷覺俊阿闍梨傳破壇作法師主口傳結願時了不起禮盤行之或以他人可行之次壇上並爐口等灑水三度次住定印觀想壇上有感字變成風輪其風爐并壇上可觀吹破之次誦法身偈以火箸爐之縁端破之但本説以獨股可破之云云先師如此傳授畢御加持發願至心發願唯願大日本尊聖者金剛愛染三十七尊兩部界會諸尊聖衆外金剛部護法天等各各還念不捨本願皆來集會同共加持護持隨時護持消除不祥消除災難惡靈邪氣三世怨敵惡人怨念壓魅呪咀作障難者伺求短者年厄月厄日厄時厄非時中夭天變怪異惡夢物怪世間所有理運非常諸不吉祥未然他方皆悉解脱眞言寶藥薫入玉體玉體安穩増長寶壽恒受快樂無邊御願決定圓滿決定成就此後大阿闍梨自始誦眞言眞言返數數遍可隨時左手持念誦取數右手取獨股順施主可加持次伴僧等念眞言念誦中間終合二度也不長不短可念珠珠摺時獨股扇上置之終念珠一度取獨股右肩小高助修令見之仍止眞言云云時發願至心發願唯願大日本尊聖者某尊等兩部界會諸尊聖衆外金剛部護法天等還念本誓降臨壇場所設供具哀愍納受護摩法味自受法樂護持國主可隨人云云消除不祥消除災難玉體安穩増長寶壽恒受快樂無邊御願決定圓滿決定成就宮内安穩諸人快樂及以法界平等利益護摩略鈔小野説隨師口傳粗注之始自房中乃至著座普禮護身等如常可行之次以三股加持灑淨香水二十一遍誦枳里枳里眞言次以獨股加持漱口香水七返眞言唵波羅娜縛曰羅淡次取散杖漬香水作二字觀了灑之如常次漱口香水三度灑旋爐口洗爐口意也次取三股加持爐口三返誦枳里枳里眞言次補闕取三股誦大金剛輪眞言三七返壇上供物等加持之此補供物闕少意也次羯麼加持其印者二手各作三股印右押左相交腕眞言唵縛曰羅羯磨欠次覽字觀等自淨地乃至五悔至供養法正念誦作法如常次散念誦了入護摩時先大日加持次部主加持次本尊加持次三平等觀法界定印次取壇上火舍壇上左角置之次取芥子火舍跡置加持七返投四方四角上下成結界三寶院傳云不動劍印慈救呪勸修寺傳云不動獨股印火界呪次結火天印加持身四處眞言小呪末加息災句次取念珠誦火天小呪百返此間先鈴并五股左脇机置之次左右脇机供物等取置壇上委細口傳有之云云次取茅草指環貫右無名指以佛部心三摩耶眞言加持之但近來醍醐流不用之延命院次第用之又勸修寺尤用之云云次左手持三股護摩間持之加持時右手用之勸修寺傳持獨股云云師主口傳云事業成辨故也次積爐薪次爐薪差火次扇火七返若火未盛不可限數有觀呪如次第云云次灑淨三度次羯磨加持次漱口三度次以三股加持爐薪三返用枳里枳里眞言次勸請火天色相隨四種不同也先結定印觀我心月輪上有覽字變成三角火輪我身擧體又火輪相也此火輪變成白色火天身四臂具足火焔遍身是遍法界身也具觀念尊儀已次取右手一花誦火天小呪置爐薪上又住定印觀此花至爐中成荷葉座座上有覽字變成賢瓶賢瓶變成火天身白色四臂具足右第一施無畏第二數珠左第一仙杖第二軍持也如此相好威儀一一分明觀念了後結火天印誦大眞言眞言末加勸請句與共娑縛賀聲以右頭指三度招之降臨本位火天冥會爐中火天想一體無二次結四明印誦眞言次金合可啓白次漱口三度次塗香三度次蘇油大杓三度小杓三度次乳木三支次飯小杓三度次五穀小杓三度次切花三度次丸三度次散香三度次蘇油大杓一度小杓一度次普供養印眞言三力偈祈願如例云云次漱口三度已上自獻召請本尊之後漱口并塗香等乃至撥遣以前漱口皆有啓白并觀呪次撥遣取右手一花誦小呪投佛前想至本位成荷葉座次結火天印誦眞言末加奉送句撥之有觀呪次金合可啓白第二部主段隨本尊不同也先以漱口香水三度灑旋爐口次勸請部主色相隨四種不同也先結定印觀我心月輪上有其尊種子變成三摩耶形我身擧體是其三摩耶相也即變成其尊相好圓滿具觀念尊儀已次取右手一花誦尊呪置爐薪上又住定印觀此花至爐中成寶蓮花座座上有種子變成三摩耶形三摩耶變成其尊相好威儀一一分明可觀之然後結大鉤召印誦其尊呪眞言末加勸請句與共娑縛賀聲以右頭指三度招之降臨本位尊冥會爐中尊想一體無二次結四明印誦眞言次金合可啓白次漱口三度次塗香三度次蘇油大杓三度小杓三度次乳木三支次飯小杓三度次五穀小杓三度次切花三度次丸香三度次散香三度次蘇油大杓一度小杓一度次普供養印眞言三力偈祈願如例次漱口三度已上自獻召請本尊之後漱口并塗香等乃至撥遣以前至漱口皆有啓白并觀呪次撥遣取右手一花誦尊呪投佛前想至本位成蓮花座次結大鉤召印誦尊呪眞言末加奉送句撥之有觀念次金合可啓白第三本尊段先以漱口香水三度灑旋爐口次勸請本尊色相隨四種不同也先結定印觀我心月輪上有本尊種子變成三摩耶形我身擧體是其三摩耶相也即變成本尊相好圓滿具觀念尊儀已更有口傳次取右手一花誦本尊呪置爐薪上又住定印觀此花至爐中成寶蓮花座座上有種子變成三摩耶形三摩耶變成本尊身相好威儀一一分明可觀之然後結大鉤召印誦本尊呪眞言末加勸請句與共娑縛賀之聲以右頭指三度招之降臨本位尊冥會爐中本尊想一體無二也次結四明印誦眞言次金合可啓白次漱口三度次塗香三度次蘇油大杓三度小杓三度次乳木百八支乳木燒盡之次飯小杓三度次五穀小杓三度次切花三度次丸香三度次散香三度今此本尊切花丸香散香供之了切花器入丸香散香次飯器入之次器共取重左机置之次取扇叩右脇机依之承仕來五穀入交飯器混屯分二器一器諸尊段料一器世天段料也次蘇油大杓一度小杓一度次普供養印眞言次乳木二十一支之内乳木六支一度取差蘇油投爐中之次藥種三度次加持物加持物器竪項頭壇置投越蘇油之器供之觀念如次第次普供養印眞言三力偈祈願如例次漱口三度已上自獻召請本尊之後漱口并塗香等乃至撥遣以前至漱口皆有啓白并觀呪次撥遣取右手一花誦本尊呪投佛前想至尊本位成蓮花座次結大鉤召印誦本尊眞言末加奉送句撥之有觀念次金合可啓白第四諸尊段隨四種護摩不同也若息災時此段尤供滅惡趣尊云云委細口傳在之先積爐薪次扇火觀呪等如火天段次灑淨三度次羯磨加持次漱口三度次以三股加持爐薪三返用枳里枳里眞言次勸請諸尊色相隨四種不同也先結定印觀我身九識轉成五智所謂第九阿摩羅識轉成法界體性智第八識轉成大圓鏡智第七識轉成平等性智第六識轉成妙觀察智前五識轉成成所作智此五智攝入五部諸尊一切聖衆又可觀我身即諸尊次取右手數花誦眞言口傳可授置爐薪上又住定印觀此花至爐中成無量蓮花座座上有各種子變成三摩耶形三摩耶變成五部諸尊等身相微妙相好圓滿一一尊有無量眷屬如此分明可觀想之然後結大鉤召印誦明眞言末加勸請句與共娑縛賀之聲以右頭指三度招之降臨本位五部諸尊冥會爐中諸尊想一體無二也次結四明印誦眞言次金合可啓白次漱口三度次塗香三度次蘇油大杓三度小杓三度次乳木三支次前方混屯一器諸尊供盡之次蘇油大杓一度小杓一度次普供養印眞言三力偈祈願如例次漱口三度已上自獻召請本尊之後漱口并塗香等乃至撥遣以前漱口皆有啓白并觀呪次撥遣取右手數花誦眞言投佛前想至諸尊本位各成花座次結大鉤召印誦明眞言末加奉送句撥之有觀念次金合可啓白第五世天段先以漱口香水三度灑旋爐口次勸請明王等色相隨四種不同也先結定印觀我心月輪上有憾字變成智劍我身擧體智劍也變成四臂不動相好圓滿具觀念尊儀已次取右手數花誦不動呪置爐薪上又住定印觀此花至爐中成明王花座天等荷葉座隨位可觀之其中央花座上有憾字變成智劍劍變成不動明王具足四臂相好圓滿次荷葉座上皆有吽字變成各三摩耶形三摩耶變成各十二天七曜并二十八宿色相莊嚴威儀執物一一分明觀念了後先結鉤召印誦不動呪眞言末加勸請句與共娑縛賀聲以右頭指三度招之次結天等勸請印言同又三度招之降臨本位明王并天等冥會爐中明王天等想一體無二次結四明印誦眞言次金合可啓白又更有口傳次漱口三度次塗香三度次蘇油大杓三度小杓三度次乳木凡投六枝先本尊三支次誦火天小呪火天三支供之已上皆誦不動呪可供之可想天等同納受之次所殘混屯一器本尊并十二天七曜二十八宿供之不動尊三杓十二天等各一杓供之此中至火天位三杓供之是不修後火天段故也以各別眞言供之口傳云尚有殘當所神等可供之用普供養眞言世天段供次第此十二天座居金剛頂經文説也一二等次第是供養次第也次蘇油大杓一度小杓一度次普供養印眞言三力偈祈願如例次漱口三度已上自獻召請本尊之後漱口並塗香等乃至撥遣以前至漱口皆有啓白并觀呪云云次撥遣取右手數花誦不動呪投佛前想至各本位成花座又荷葉座次結大鉤召印誦本尊呪眞言末加奉送句撥之次結天等撥遣印誦眞言末加奉送句撥之有觀念次金合可啓白次護摩了右方供養香有殘者投爐其器可置本所次鈴五股如本返置之次火舍并閼伽器共又如本取置之次大金剛輪眞言七返若二十一返可隨時也次一字金打之大阿闍梨百返了念珠脇机置先字輪觀次理供養印明次事供養等作法如常可行之云云已上五段護摩供了但行大法時可用三十六支段段初灑淨香水等如初火天段可行之云云又云積薪事乍四種如息災可積之更不可替以一可知餘云云右小野護摩祕説依師主口傳注之努努不可及他見之金剛鉤菩薩印言二手外縛二頭指開立如鉤形召之唵縛曰羅二合矩尸阿羯荼微羯荼娑縛賀供物啓白我今奉獻塗香妙供但此句隨物不同也唯願火天但此句隨段不同也納受護摩悉地圓滿降臨啓白唯願火天但此句隨段不同也降臨此座哀愍納受護摩妙供悉地圓滿奉送啓白唯願火天但此句隨段不同也還著本座降臨啓白唯願明王及與天等降臨此座哀愍納受護摩妙供悉地圓滿世天段供物啓白我今奉獻塗香妙供隨物不同也唯願明王及與天等納受護摩悉地圓滿奉送啓白唯願明王及與天等還著本座慈悲護念悉地圓滿供物觀應觀漱口香水洗彼御口塗香等妙供入彼御口至心蓮花臺成種種微妙供具從心遍身從其毛孔流出供養一切佛菩薩縁覺聲聞及一切世天也供物呪事火天段用火天小呪部主段用其尊眞言本尊段用其尊眞言諸尊段用普供養眞言天世段用各別眞言在口傳云云勸請句者翳醯翳呬四字明者弱吽鑁斛奉送句者蘖車蘖車穆師主口傳云病苦加曩加曩恐怪那賀那賀怨家跛左跛左不饒益度度度度毒藥賀賀賀賀壓祷爾置爾置滅罪祖嚕祖嚕護摩五段理觀勸修寺説云云師主口傳受之火天事相部主六度本尊破煩惱諸尊功徳世天理觀三平等觀委細別在之朱師主口奉受之了三位大壇爐座處三主本尊火天自身三業身業口業意業就三業有二種一本尊意業爐口業身身業二尊爐身各有身口意三業如此種種三種皆是不二平等也同五大所成共不離實相理故理外無事事外無理事理不二三種畢竟一體也積三十六支樣行大法時可用之火天段十一支如常部主段四支所謂先前火天段上六支之左初一支猶左置一支次右終一支猶右置一支並本六支合八支也次佛前次行者前故成四支是亦左右前後次第也前者佛前後者行者前也本尊段六支前部主段前後二支上竪置六支從左至右諸尊段十支如前但無底一支世天段五支竪置之從左至右故成三十六支口傳云乳木本爲佛前金剛盤之上可置之乳木供事三支一度取之先本差蘇油次末差蘇油仰手横一支供之諸段同丸香供事一度取三丸一投之諸段同置杓事大杓供了即置本所次小杓供了即置本所四字明事檜尾僧都説也請諸天時眞言下加之言那牟者是等義也假令云嚕陀羅時是唯請王若嚕陀羅南時是等眷屬故也準之餘亦悉之爲請時伊醯伊醯是勸請之詞故又奉送時眞言下加掲捨掲車是奉送之詞故也奉請時加四字明眞言所以爾者云弱時已成佛降臨於道場同一體性諸佛降臨於行者頂云吽時遍於行者身云鑁時住堅密云斛時諸佛歡喜也一切勸請皆如是四字明後方始稱娑縛賀也世天散念誦不得金剛部眞言及雜念誦恐難成就云云四種護摩事一息災佛部向北方修之初夜始之壇木甘木椎木榎木柏木穀木桑木用無毒甘味木也乳木長六寸其頭圓桑木穀木栗木供花白色花藥種甘草遠志苟𣏌加持物胡麻相應句扇底迦羅本尊白色火天同衣服同加持物觀念其觀入從尊御口至心蓮花臺成衆多光明輪即從一一毛孔流出光明輪雲海而供養十方無邊諸佛海會其光明輪還來普照自他身心三毒罪障皆悉摧破一切災難速疾消滅云云入護摩時先大日加持次阿閦尊次本尊等印息災本尊佛眼金輪尊勝不動八字文殊白衣聖觀音千手十一面準胝不空羂索大佛頂五大虚空藏法花孔雀經仁王經泥塔熾盛光北斗焔魔天聖天加樓羅伎藝天二増益寶部向東方修之晨朝始之壇木黄木椎木榎木柏木檉木乳木長六寸四方作之栗木胡木穀木供花黄色花無毒不臭世人所愛花也藥種天門冬桂心地黄訶梨勒枸𣏌加持物白米黄染用之相應句補瑟徴迦曩莫本尊黄色火天同衣服同加持物觀念此粳米丸供入從本尊御口至心蓮花臺成無量如意寶雲海從一一毛孔流出供養盡虚空法界諸佛菩薩便還來旋轉我及彼施主頂上雨無量珍寶資具所求之事所願悉成辨云云入護摩時先大日次寶生尊次本尊等印種子唵字芥子加持用軍荼利小呪増益本尊尊勝五大虚空藏大虚空藏如意輪持世毘沙門吉祥天地天訶利天氷迦羅天施餓鬼大佛頂又御本四角三昧耶形無之三調伏金剛部向南方修之日中始之或半夜羅刹日用之壇木苦木佉陀羅木大棗臭木毒木乳木長八寸兩頭三角臭木桃木橿木苦練木供花薊花或青色紫色等毒草毒木花也藥種鐵末又云附子菖蒲鬼臼鬼箭射干巴豆細抹和合用之加持物黒芥子相應句阿毘舍盧迦吽發吒本尊黒色忿怒火天同衣服同加持物觀念此芥子供入從本尊御口至心蓮花臺成無量利劍雲海從一一毛孔流出供養盡虚空法界一切忿怒尊還來加持護念我及施主摧破消滅厭媚呪咀四大鬼業惡靈邪氣病令得安隱快樂入護摩時先大日次不空成就次本尊印種子覽字芥子加持降三世調伏本尊六字轉法輪太元不動降三世軍荼利大威徳金剛夜叉烏瑟沙摩金剛童子八大童子摩利支天大自在天四敬愛蓮花部向西修之一切時修之壇木花木椎木榎木柏木桑木檉木乳木合歡木桑木穀木赤木色花木通説梅櫻等供花赤色花世人所愛花歡草等花藥種相思子訶利勒天門冬紅荳蔲加持物米粉赤染用之相應句縛試迦羅拏斛本尊赤色火天同衣服同加持物觀念此團丸供入從本尊御口至心蓮花臺成無量蓮花箭雲海從一一毛孔流出供養盡虚空法界諸佛菩薩便還來射拂我及施主彼此等憎惡隔別厭離菩薩之心彼此一體和合互令起無二敬愛之心云云入護摩時先大日次無量壽次本尊等印種子吽芥子加持馬頭敬愛本尊愛染王金剛藥叉如意輪阿彌陀帝釋千手勸修寺法務説也御本云以又御本重挍了一校了建長二年五月二十二日賜極樂坊御本書字畢求法沙門顯成生丨二十二丨校合了
