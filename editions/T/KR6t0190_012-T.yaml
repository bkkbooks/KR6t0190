body:
  text: 諸尊要抄第十二梵天帝釋地天毘沙門最勝太子訶利帝呪賊經寶藏天女蘘倶利童子摩利支水天法梵天樓閣中有荷葉座座上字字變成花手所持物隨事可替用之蓮花變成大梵天王相好具足面上三目四面四臂右一手施無畏次手持鉾左一手持蓮花次手持軍持眷屬圍繞讃諸天讃印定手屈水入月以空押水側上也惠拳安腰胎藏定半蓮云云眞言曰歸命波羅惹沙多曳娑縛賀同明妃定持花歸命三摩多曳娑縛賀已上二印言胎藏外院梵天左五指立屈右拳安腰是半紅蓮花印也唵昧曩縛曰羅已上印言金剛界二十天帝釋樓閣中有荷葉座座上有又或字字變成獨股獨股變成帝釋天赤色右手持杵左持拳安腰著冑及天衣忿怒形也眷屬圍繞云云印内縛二風竪合如針二空並竪眞言曰歸命鑠乞羅耶娑縛賀帝釋天金色内縛二風二空并立唵縛曰羅庾馱東方泥縛已上印言金剛界二十天地天又或三賢瓶或鉢十二天供云云印鉢印也金壇上有七寶宮殿殿内有阿字成荷葉座座上有鉢哩字字變成四瓶瓶變成堅牢地天首著髮嚢身著羯磨衣莊嚴微妙兩手持寶瓶諸地神等眷屬圍繞云云印定惠指端聚一處令作掬形眞言唵微里體尾曳娑縛賀讃諸天讃毘沙門壇中有惡字變成七寶宮殿其中有二肘壇其上有荷葉座座上有藥叉二字變成二鬼座上有字變成如意棒棒變成毘沙門天王身忿怒甲冑形也左手持塔右手執捧或戟座立眷屬圍繞本尊印虚合二地入掌交二風舒勿著火背唵吠室羅末拏耶娑縛賀又印合掌屈二地二火入掌以二大指押火甲招風金剛界二十天之中印内縛竪二火如塔形云云口傳也次第中指一股云云眞言曰唵縛曰羅昧羅縛娑縛賀大呪曩謨引囉怛曩怛羅夜也曩謨引失戰荼縛曰羅幡拏曳摩訶藥乞叉細曩鉢多曳曩謨引阿他骨嚕藥室拏薩也摩訶囉引惹摩羅𤚥怛藍鉢羅尾沙弭薩縛薩怛縛呬底瑟南怛儞也他唵摩尼縛馱羅也薩縛賀布嚕拏縛馱羅也薩縛賀摩拏栗託也薩縛賀悉定迦羅也薩縛賀吠失羅未拏也薩縛賀難一聲曩馱也薩縛賀引次吉祥天印言如常禪貳師童子一印金剛掌明曰唵奢擧多羅夜娑縛賀右毘沙門之吉祥禪貳師云云次獨建二那吒三常見四最勝五右毘沙門之五太子云云次八大藥叉并二十八使者等印言在別吉祥天法在別最勝太子毘沙門第三太子云云樓閣中有大盤石山山上有曼荼羅曼荼羅上有字字變成刀劍刀劍變成如意天王其像八臂四面當前正面作平正圓滿之相猶如菩薩相左廂面青黒色大張口虎牙相右廂一面作自在天相赤白色當前上面作藥叉極惡相牙齒長利身赤黒髮色作金青色其天王左右二手皆竪持刀左右手相雙持縛曰羅叉左右二手合掌當心左右二手下倶持槍其身雄状迅極可畏以五色雲散垂爲蓋諸天藥叉大將二十八部前後圍繞云云印合掌當心即以二大指右押左交入掌二頭指並竪餘三指交作拳然頂戴之三上三下眞言曰唵那吒倶伐羅娑縛二合賀名香用求求羅香安悉息災訶利帝法師説像面向西其持誦者壇西面東對像念誦或四時三時乃至一時不應間闕若有間斷法即難成亦不得誦金剛部眞言及雜念誦恐難成就毎時誦一百八返爲常正念誦時可離共人語從白月一日五日及十六日二十日起首云云種子三吉祥菓發願至心發願唯願大日四智如來普賢觀音大聖文殊本尊聖者大藥叉女歡喜母天沙多半支諸大藥叉五百諸子五千眷屬降臨壇場所設供具哀愍納受護持已下如常四無量觀勝願大金剛輪地結道場觀中大小迴金剛合掌大虚空藏大藥叉召請印言愛子召請印言拍掌次閼伽右方想足洗奉座荷葉印言五供印明如常次現供右塗香花飮食菓子等先想供養佛菩薩等祕事也左塗香花飯食菓子等次想供養鬼子母神等祕事也讃諸天拍掌三度次普供養印言三力祈願禮佛餘句如常南無歡喜母女訶利帝母三返南無加妙南無増喜南無自在南無飛行南無安住南無同蘇南無愛授南無香味南無得財南無五百諸子南無三昧耶印言觀音印言文殊印言本尊印言降伏印擲惡人印言愛子印言次念誦眞言等本尊愛子三歸眞言如來慈護眞言觀音八不頌金剛偈最勝王經寶號次閼伽左方漱口料讃普供養三力祈願禮佛迴向五悔後段也解界地結撥遣先二召請印向外撥之三部被甲普禮出堂大藥叉女召請印以右手指左手背指間交入把左手掌左手向右三度召之其印相即成眞言曰唵弩弩麼鼻音引里迦引呬諦娑縛二合引賀引二愛子召請印二手合掌二大指並屈掌中以二大指招之云云眞言曰唵一引致尾致𩕳娑縛二合引賀引二普賢菩薩印言曰外縛三摩耶印唵三摩耶薩怛鑁觀音印二手外縛立二頭如蓮葉即成云云祕事云云又印在之言曰唵阿嚕力迦娑縛賀文殊印金剛外縛立忍願如劍形印心額喉頂四處即成護身云云言曰唵惡尾羅吽迦者洛本尊印印如内三股二手内相叉二小指相鉤二無名指各左右入虎口二中指竪合二頭指各捻中指背二大指各捻中指中節其印相即成云云言曰唵引一弩弩麼引里迦引呬帝娑縛二合引賀引一擲惡人印眞言曰次以右手大指捻無名指甲上毎誦眞言一返一度彼人擲之其印相即成眞言本尊言也愛子印合掌屈二大入掌中云云言曰唵引一知上尾知上𩕳娑縛二合引訶引二三歸眞言曰唵僕欠如來慈護眞言曰爲訶利帝増威光用之云云唵沒駄昧怛里縛曰羅囉呬奢憾一字金輪眞言或傳云天等用此眞言云云唵多羅多羅波娑羅吽訶利帝讃曰高野亮阿闍梨説云云師主奉習之了仍注之母訶利帝母曩謨率都帝娑縛賀勸請呵利帝母鬼子母揵陀山中諸眷屬凡若人不知九子鬼名時雖供禮敢不受用能知名號之雖有先生貧報多得福利云云呪賊經法付金剛界大法從地至于道場觀云云壇上有八紇哩字變成荷葉座但中心一葉勝大也其上各有吽字皆成刀中心刀變成本尊訶利帝母菩薩餘皆成鬼神圍繞本尊印金剛合掌師説合甲唵弩弩麼引里迦引呬帝娑縛二合引賀引一散念誦佛大本愛藥延破宿賊經後三呪不載卷數愛子眞言唵引一知上尾知上𩕳娑縛二合引訶引二師説洗米供云云佛供九盃但一盃大也或説云有七孩子云云菓子石榴安息香小野僧正傳也訶利帝供一七箇日支度壇一面方三尺五寸脇机一脚燈臺二本半疊一枚蘇蜜名香白檀安息壇敷布一段閼伽桶一口加杓折敷二枚壇供米三石五斗御明油三升阿闍梨承仕驅仕淨衣白色右注進如件年月日軌云不用燈明寶藏天女法像二尺五寸壇上有五色綵以爲座其上有字字變成寶珠寶珠變成天女頭作花冠所點花端正身著紫袍金帶鳥靴右手把蓮花左手把如意寶珠光明威徳無比云云印眞言曰以中指無名指屈以大母指押二指甲舒頭指及小指安心上右手把數珠念眞言此玉環印云云唵陀羅哦陀羅哦尾陀羅儞娑縛賀誦滿一千遍諸願如意云云寶藏天女讃云微妙殊勝不思議柔嫩香鮮光如日眉目端正最稀有身膚細滑如兜羅口中香氣滿人間而生視者忻瞻視一心欲求如是人常加敬慕心不疑雖示世間種種事畢竟速成清淨道能使持者到菩提相共同證無上覺取五月五日前七日乃至二七三七及於百日或三十九日乃至五月五日滿足者其法即成文師傳云種子吽三寶珠能成世間殊勝事迴天動地傾山覆岳或財帛金寶如山説呪曰唵吒羅佉吒羅佉毘多羅儞娑縛賀五月五日前七日内長齊淨潔行此法天女不喚自來五月五日夜存念誦千八三更心昏來必莫語有所問隨問答之長生好藥世間萬事終身奉事乃至作姉妹必須分明勿生孤疑二肘半壇牛糞香泥五色綵畫安天女蘇蜜乳菓子各一盃五色蘇花餅各五枚粟麥作花供之像二尺五寸花冠端正著紫袍金帶烏靴右把蓮左把如意寶財帛盈溢高官遷貴賎男女歡喜凡一動一切鬼神皆迎侍世間好妙隨意惡人相害呼賊名自縛自打萬病皆瘥八眞言像前各誦三七返然後作法云云唵興波羅帝吒急急娑縛賀唵折羅帝吒利摩耶娑縛賀唵勒叉那帝吒娑縛賀唵婆婆隸若帝吒娑縛賀唵勃惹羅帝吒娑縛賀唵藥叉藥叉底那婆娑縛賀唵遮帝毘折曳吽泮娑縛賀唵折勒那耶到婆帝吒娑縛賀中名屈入掌以母指押二指甲舒頭指小指安心右把數珠念眞言名玉環云云摩訶迦羅提婆合掌印壇上有阿字變成樓閣其中央有惡字成荷葉座座上有字字變成袋形形變成大黒天神身色悉作黒色頭令冠烏帽子悉黒色也令著袴驅褰不垂令著狩衣裙短袖細右手作拳令收右腰左手令持大袋從背令懸肩上其袋之色爲鼠毛色其垂下程餘臀上云云南海傳第一云坐把金嚢却踞小床一脚垂地毎將油拭黒色爲形云云胎藏圖六臂云云讃諸天印普印眞言唵摩訶迦羅耶娑縛賀又印内縛舒地水來去是也眞言唵密止密止舍婆隸二合多羅羯帝娑縛賀師主口傳云種子吽三袋印普印眞言如常蘘麌利童女法香醉山上有寶樓閣中有吽字變成黒蛇轉爲蘘麌利童女身緑色状如龍女具足七頭項有圓光四臂右一手持三戟叉第二手執三五莖孔雀尾左第一手把一黒蛇第二手施無畏七寶瓔珞耳璫環釧臂釧脚釧莊嚴鹿皮爲衣諸毒蛇爲瓔珞諸蟲蟒蛇之類爲伴戲四面圍繞云云根本印曰二手相博如掬物勢以小指相並餘八指各散微屈即成加持自身五處所謂左右肩心喉額等頂上散印云云隨心印右手五指散開微屈如師子爪形成結此印誦隨心眞言七返加持五處隨心眞言曰唵阿枲幸以反爾賀吠二合引一戍攞爾賀吠二合引二縛曰羅二合迦引曳引三仡羅娑四入縛羅入縛二合羅五摩賀引迦哩引六摩賀引喩祇霓夷反引七濕縛二合里曳引八唵頗𪘨引九普吒羅奚引娑縛二合賀十吽發吒莎呵十一滿一萬返吉祥成就於眞言句中増加左攞婆縛尾鑠娑婆賀句烏頭湯入閼伽供養又用名香裏云附子名也常瞿利毒女經云嬰多三藏譯此常瞿利雖現女身實非女也文或傳云種子三摩三戟叉總此女諸天部主也云云蘘麌利童如法隨心眞言功能滿一萬遍先行成就於眞言句中増加左攞娑嚩尼鑠句又像畫常瞿利形作一童子百福相好莊嚴其身鹿皮爲衣著嬌奢耶衣大袖車輅髻右手執降毒劍左手把毒管木印隨願求有差也遍身瓔珞毒蛇相傳環玔面前畫一青衣童子把水椀及香藥百種毒菓子及諸毒𫌏普在常瞿利面前遍四面各畫山山兩邊畫虎狼師子蚖蛇毒龍蝮蝎諸惡毒蛇四面周圍若作壇隨心一時二時且上安形像供養欲成就此法先斷五辛亦不食鹽不食油斷言語於淨處澡浴擐衣結印誦隨心眞言滿一萬遍然後作一切事必獲成就云云觀音眞言加用燒蔓都蘿香可尋之摩利支天向東方修之樓閣中有荷葉座座上有字變成天扇形形變成摩利支天似天女形左手屈臂向上手腕當左乳前作拳拳中把天扇扇如維摩詰前天女把天扇於扇當中作西國萬字字如佛胸上萬字四曲内各作四箇日形一一著之其天扇上各有光焔形右手申臂並申五指指頭垂下眷屬圍繞云云印二手地水内相叉右押左風空並竪合以火纒風如大金剛輪印印身五處云云唵摩利支曳娑縛賀定作虚掌惠亦作虚掌横覆定虚掌上若有難時想在此中若爲他人修此想在此中也此天在日天子之前不能見天人眼口説云寶瓶印或傳云菴室印云云又是甲冑印唵訶儞怛耶摩利支娑縛賀水天法此法者向北方可修之是水方故也壇敷青色物用之若絹若布或紺布用之三時行之龍索青色生糸三尺用之但可結委細在口傳佛供十六盃汁並菓子各二盃後夜粥八盃云云略時佛供等各三盃種子或字三摩龍索印内縛竪合二風令圓如環云云眞言曰曩莫三曼多沒馱南阿播多曳娑縛二合賀又呪曰唵縛嚕拏野娑縛賀又以御本重交了一交了御本云建保六年二月二十一日於遍知院以御本書了金剛佛子憲丨生丨二十七建長二年六月八日賜極樂房御本書寫了求法沙門顯成生丨二十二丨校合了
