body:
  text: 諸尊要抄第七六觀音故入道殿注進六觀音像事仁海大悲觀音者正觀音變救地獄道身色青色也左手取青蓮花右手施無畏也大三古印用本呪大悲觀音者千手變救餓鬼道身色黄金色六面慈悲相左手取紅蓮花右施無畏也蓮花合掌唵縛曰羅達麼頡哩又師子無畏觀音者馬頭變救畜生道身右手取蓮蓮上有梵篋左施無畏梵篋印唵縛曰羅佉娑縛賀大光普照觀音者十一面變救阿修羅道身肉色右手取紅蓮花花上有花瓶瓶口立半獨𦙶也左施無畏不動本印也唵摩訶波羅多娑婆賀天人丈夫觀音者准胝佛母變救人道合二小二無名内叉二中立頭付中背以二大付二頭側唵折隸主隸準提娑縛賀身色紺青右取青蓮左施無畏大梵深遠觀音者如意輪變救天道大三𦙶古頭指如寶形之唵紇哩薩訶波羅娑縛賀身色白左持蓮蓮上立三𦙶杵右施無畏右六觀音形色名號如此皆慈悲相也大略出摩訶止觀仔細之旨先師所傳記也治安三年二十二日權律師聖觀音大慈破地獄道三障此道重苦宜用大慈息災除病敬愛種子三摩蓮花或獨古部主馬頭小野千手三寶院傳諸尊六觀音又三十七尊根本印二羽内相叉作拳以禪度出外直立眞言唵阿嚕力迦娑婆訶祕印二羽外縛二頭指如蓮花形眞言如上禮佛句南無阿利耶縛嚕吉帝濕婆羅冐地薩埵摩訶薩埵發願句正法金剛勸請句大聖慈悲觀世音蓮花部中諸聖衆正念誦本呪伴僧并御加持同字輪觀阿等千手大悲破餓鬼道三障此道飢渇宜用大悲種子三摩開敷蓮花師主口傳云隋事以所持可爲三摩耶形祕祕也部主聖觀音小野醍醐又馬頭小野諸尊六觀音又三十七尊根本印二手合掌左右無名指頭指端立二火少屈二中指如蓮葉圓二小指二大指張立即成師主受之用陀羅尼云云又眞言唵縛曰羅達摩紇哩莎賀又印八葉蓮花印用小呪師主口傳也又印三寶院權僧正傳云云師主祕説也名蓮花五古印云云先二手合掌左右二無名指二頭指外縛二中指立二小指二大指開張立即成此印用陀羅尼云云陀羅尼在別梵字也禮佛句沙訶沙羅布惹阿利也縛路吉帝濕婆羅發願句大悲金剛勸請句千手千眼觀世音蓮花部中諸聖衆正念誦小呪伴僧并御加持陀羅尼字輪觀阿等師主口傳云散念誦尤毘沙門眞言可加誦云云又云赤色紙八葉蓮花造百八枚本尊壇燒之馬頭師子無畏破畜生道三障獸王威猛宜無畏種子又三摩白馬頭部主聖觀音諸尊六觀音又三十七尊根本印二手合掌二頭指二無名指屈入掌各相背並二大指微屈勿著頭指眞言唵阿密哩二合都納婆二合縛吽發吒娑縛賀勸請句馬頭觀音大悲尊蓮花部中諸聖衆禮佛句曩謨阿利耶賀耶枳里波冐地薩埵摩訶薩埵發願句噉食金剛迅速金剛正念誦本呪伴僧并御加持同字輪觀阿等十一面大光普照破阿修羅道三障其道猜忌嫉疑偏用普照經二臂軌四臂種子又三摩軍持部主聖觀音小野醍醐又馬頭小野諸尊六觀音又三十七尊根本印二手右押左相叉合掌以印置頂上師主口傳云此印深叉也祕祕説也又諸印開敷蓮花印眞言曰唵那羅那羅地里地里度嚕度嚕壹知縛知者隸者隸鉢羅捨隸鉢羅捨隸矩蘇咩矩蘇摩縛隸壹里弭里止里止里致惹引羅摩跛曩也跛羅摩秫駄薩怛縛二合摩訶迦嚕尼迦引娑婆賀小呪唵嚕係濕縛羅紇哩娑婆賀禮佛句曩謨阿利耶噎迦娜舍目佉發願句變異金剛勸請句大聖慈悲十一面蓮花部中諸聖衆正念誦呪小呪御加持眞言伴僧敬禮智海等字輪觀阿等准胝天人丈夫破人道三障人道有事理事伏憍慢稱丈夫理則見佛性故稱丈夫息災延命除病師主口傳云求兒修此法云云保元四年三月十八日始行之百箇日等身像師主手替也三目十八臂也種子三摩甲冑又五古小野或賢瓶部主大日胎藏師主説馬頭正觀音諸尊六觀音又三十七尊根本印二地二水交入掌二中指直立頭著屈二風著火上節側二空著風側祕印外五古印内三古印但二空著風側曩謨薩怛縛南三藐三沒駄倶底南怛爾也他唵折隸主隸準提娑婆賀勸請句准胝佛母摩訶薩如來部中諸聖衆禮佛曩謨阿利耶沒駄縛佉縛底發願句最勝金剛正念誦眞言小呪御加持并伴僧呪本呪字輪觀阿等如意輪大梵深遠破天道三障梵是天主標主得臣也息災増益敬愛師主云六字章句陀羅尼觀音經所説也依止觀六字即是六觀音之釋是擧皆六觀音云云小野僧正取準胝不取不空羂索可仰此説云云八家祕録以準胝不出觀音部云云種子三摩金剛寶蓮師主云深祕云紅蓮花上置震多摩尼寶云云不空軌云月上八葉蓮花上有如意寶珠如紅頗梨色赫赫光明至無量世界於光明中想自身本尊像云云部主聖觀音小野醍醐馬頭小野諸尊六觀音又三十七尊根本印平掌當心忍願如蓮花葉進力摩尼形餘度盡如幢用陀羅尼眞言曰娜謨囉怛娜怛羅夜也娜謨阿唎耶縛魯枳帝濕縛羅耶菩提薩怛縛耶摩訶薩怛縛耶摩訶迦嚕抳迦耶怛姪他唵斫迦羅靺彈舌低震跢摩抳摩訶鉢頭迷嚕嚕底瑟吒入縛羅阿迦哩灑耶吽泮吒薩縛訶心祕密印依前根本印戒方檀惠縛一切意願應心之所念皆悉得成就眞言曰唵鉢頭迷二合震跢摩尼入縛攞吽隨心印二手堅固縛進力摩尼形禪智並而申戒方亦舒直檀惠相交心中眞言唵縛羅娜鉢頭迷二合吽師主口傳祕印云八葉蓮花印之上觀寶珠云云眞言心呪用之勸請句大聖如意輪觀世音蓮花部中諸聖衆禮佛句曩謨阿利耶震多摩尼冒地薩怛縛摩訶薩怛縛發願句持寶金剛正念誦心中呪御加持并伴僧大呪字輪觀阿等以又御本重交了一交了建保六年二月十三日於遍知院以御本書了金剛佛子憲丨生年二十七才建長二年五月十三日賜極樂房御本書寫畢求法沙門顯成生年二十二才校合畢
