body:
  text: 諸尊要抄第六一髻文殊五字文殊六字文殊八字文殊一字金輪佛眼尊勝一髻文殊産生左手執青蓮花花上有如意寶珠右手向外垂下五輪作滿願印云云明説云云種子三摩青蓮上如意寶珠部主馬頭諸尊八大童子又三十七尊印八葉蓮花印心眞言唵娑麼那始里吽娑縛賀隨心眞言唵阿捨麼𩕳吽娑縛賀小呪唵叱洛呬焔娑縛賀勸請句本尊聖者一髻文殊蓮花部中諸聖衆發願句一髻文殊正念誦眞言用小呪御加持心眞言伴僧同字輪觀阿等五字文殊右手持智劍左手執青蓮花花上有般若梵筴云云首有五髻下有光形劍有火炎云云種子三摩智劍部主馬頭諸尊八大童子印外縛忍願申如劍形言唵耨佉砌那根本印虚心合掌二火押水屈風捻空甲言唵阿羅波者曩勸請句本尊界會五字文殊蓮花部中諸聚衆禮佛南無阿利也曼殊師利發願句五字文殊正念誦眞言本呪御加持并伴僧同又説虚心合二大指入掌中以二頭指立節上是傳法印云云眞言唵縛曰羅底乞史拏地瑟姹二合娑嚩二合𤚥莎賀六字文殊種子三摩梵篋部主馬頭諸尊八大童子又三十七尊印言唵縛曰羅底里瑟拏淡娑縛訶勸請句本尊聖者六字文殊蓮花部中諸聖衆禮佛句南無阿利也曼殊師利發願句六字文殊御加持本呪伴僧同字輪觀阿等八字文殊息災祕祕天變惡夢種子三摩師子頭梵篋三𦙶又青蓮花上五古又青蓮花上梵筴其上五古口傳云三寶三劍三梵部主馬頭小野祕説金輪大威徳諸尊八大童子總種子三摩三古各別種子在別用鉤召印云云祕説云天變之時用之九曜七星用之云云左右縛也太古傳也印五古印祕祕八葉印又印二手内縛禪智並立如開師子口云云此印有口傳隨事不同也祕事也仍不注之口可授之又印合掌左右風空開云云法務務御房祕事也眞言破諸曜宿明用之云云又印金剛外縛立忍願如劍形印心額喉頂云云眞言曰唵惡尾羅吽欠者𡀩究竟祕説云普通説用妙吉祥破諸宿曜印明極祕説以件印用本尊八字眞言云云法務傳也梵號阿利也曼殊師利勸請句八字文殊大聖尊蓮花部中諸聖衆密號般若金剛又吉祥金剛正念誦本呪伴僧御加持同字輪觀阿等師主説云散念誦八大童子眞言各百返滿加之云云又馬頭眞言百返云云振鈴之後八大童子印明可用之胎藏次第在之次理供養次事供養等如常醍醐聖賢遮梨傳字輪觀之後用八大童子印明次本尊加持次正念誦云云八大童子各別種子三昧耶形請召三幢北計設三梵東北救護東烏波三劍東南光網三羂索南地惠三風幢西南無垢三未開敷蓮西不思三未敷蓮西北以上各乘師子各執持三摩耶形云云首髻八智尊者八字文殊也此菩薩頂有八髻一一上皆有佛身此八佛即文殊八智也以眞言八字即爲其八佛種子故八髻上次第可安八字眞言也八字文殊首有八髻毎髻下有佛像持物青蓮之上五𦙶杵劍無火炎云云花座印八師子座可觀之云云鎭法在別一字金輪息災産生所望天變仁海云大日金輪法身釋迦應身我化身種子三摩十二輻輪或鑁十二幅輪部主佛眼孔雀明王祕祕説云諸尊三十七尊根本印此印摩訶印所謂如來頂適纔結作之即同於本尊先合掌以左右二無名指二小指右押左相叉入掌二中指直竪屈第一節頭指相拄如劍形二大指並立二頭指平屈兩節頭相拄於二頭指甲上云云出大日劍印并同用法眞言曰師説祕祕説也云云曩莫三曼多沒駄南唵若有祈請所求一切事者於此應加誦孔雀明王呪云云勃嚕唵師主云加用眞言事究竟祕事也安祥寺録金輪王佛頂略念誦法通一切佛頂同用法亦大日劍印此等文在之云云三寶院權僧正傳用智拳印義範僧都傳云云眞言曩莫三曼多沒駄南唵勃嚕唵勸修寺法務傳祕印云云師主受之二手外縛二中指竪合端如劍形二頭屈二中指付背云云私云金剛界五佛潅頂之中遍照尊印也眞言如上大教院僧都傳用智拳印勸請句一字金輪轉輪尊八大佛頂諸轉輪禮佛句曩謨曳佉乞叉羅三寶院傳又説南無一字金輪轉輪王勤修寺傳正念誦本呪加用眞言也御加持本呪權僧正傳圓宗寺御修法之時被用之云云伴僧同又説辨事佛頂眞言云云五佛頂經出師主傳小野曩莫三滿多沒馱南唵吒嚕二合滿馱娑婆賀金打後眞言三寶院權僧正傳云金剛界大日眞言云云小野説師主傳也今説法務傳也曩莫薩縛沒駄冒地薩怛縛二合南引阿尾羅吽欠權僧正傳云唵縛曰羅駄都鑁四輪王中金輪王殊勝也故解此尊云金輪王又國王寄之奉祈稱金輪聖王云云光明輪雲海者金輪王也七寶者輪寶象寶馬寶珠寶女寶主藏臣寶主兵臣寶佛眼息災種子大理趣房寂圓説三摩佛頂眼師主祕説異本三摩普通説又説石山内供又大教院傳也又説私云三寶珠云云祕説部主金輪釋迦祕説云大日諸尊三十七尊八大菩薩八大明王祕事北斗七星供之鉤召印八大菩薩八大明王眞言世天段如常印根本印如常用大呪瑜祇經説也口傳云先右目左目右肩左肩次眉間竪眉間上拭之想成五眼又以印兼誦眼明右旋拭面三返一切見者皆悉歡喜云云師主口傳也究竟祕事云云又印用小呪祕印也金剛合掌左右頭指屈甲合二大指以二頭指上押之密印也小呪曰唵沒駄嚕遮尼娑縛賀勸請句本尊界會佛眼尊八大菩薩諸薩埵又樣曰佛眼佛母大覺尊八大菩薩云云金剛吉祥佛眼尊八大菩薩云云梵號曩謨阿利耶沒駄嚕遮尼密號殊勝金剛正念誦眞言大呪又小呪加持物小呪用之御加持眞言本尊呪伴僧同字輪觀阿等諸尊段供物眞言普供養眞言又八大菩薩八大明王眞言可用也口傳云八大菩薩印言胎藏諸菩薩印言用之普印也八大明王印言胎藏一切持金剛印言用之金剛部三昧耶印也本尊加持金輪印言大呪印小呪印八大菩薩八大明王已上五印本尊加持之所用之云云師主口傳奉受之師主口傳云振鈴之前誦金剛界大日眞言振鈴之後用本尊呪云云祕説普通前後共誦佛眼眞言云云或本尊像身白色著五智冠住法界定印座白蓮花圖云肉色定印坐蓮花云云尊勝増益息災除病滅罪一卷軌云本尊之像安東壁云云増益也雖然又行息災也種子三鉤部主寶生尊種子三摩如金剛界尊形同也小野説也諸尊八大佛頂本尊印二手合掌屈二頭指甲相背以二大指押二頭指如彈指勢即誦陀羅尼此印言出一卷軌之根本印内縛鉤右風出二卷軌之但用大呪曩莫三曼多沒駄引南引訶林二合尾枳囉拏半祖鄔瑟二合抳灑娑婆二合賀此印言出胎藏或用智拳印陀羅尼云云禪林寺傳云用智拳印大日眞言云云究竟祕事也醍醐傳云外五古印用歸命阿尾羅吽欠深祕祕説也師主口傳云率都婆印用陀羅尼極深祕説云云勸請句尊勝佛頂轉輪王八大佛頂諸轉輪禮佛句今此次第先徳依胎藏歟南無怛隸嚕迦烏瑟尼沙怛他蘖多三返南無悉多他半怛羅烏瑟尼沙怛他蘖多白傘南無惹野烏瑟尼沙怛多蘖多勝佛南無尾惹野烏瑟尼沙怛多蘖多最勝南無帝儒羅施烏瑟尼沙怛他蘖多光聚南無尾枳羅拏半祖烏瑟尼沙怛他蘖多尊勝南無吒嚕吽烏瑟尼沙怛他蘖多廣生南無輸嚕吽烏瑟尼沙怛他蘖多發生南無吽惹欲烏瑟尼沙怛他蘖多無量南無金剛界一切諸佛菩薩摩訶薩南無大悲大藏界一切諸佛菩薩摩訶薩梵號在別密號降魔金剛正念誦眞言出尊勝陀羅尼經疏下卷云云師主説也唵阿密利多帝惹縛底娑婆賀御加持眞言法務御房以此呪御加持勤仕之師傳也仍師主傳受了歸命訶啉二合尾枳羅拏半祖烏瑟二合抳灑莎婆訶伴僧念陀羅尼字輪觀阿等加持物呪用正念誦眞言讃四智不動曼荼羅圖一二等次第并所持依二卷軌注之小野僧正最勝爲始廣生爲後是從右方順迴次第歟種字依内供説注之本説可尋之東壁右畫陀羅形者師主云五輪塔也祕祕説也後夜發願句至心發願唯願大日本尊聖者尊勝佛面八大佛頂諸大轉輪兩部界會諸尊聖衆外金剛部護法天等還念本誓降臨壇場所設妙供哀愍納受護摩薫入護持消除増長恒受無邊決定殿内諸人天下平等又以御本重交了一交了御本云建保六年二月十四日於遍知院以御本書了金剛佛子憲丨生年二十七才建長二年五月八日賜極樂坊御本書寫畢求法沙門顯成生年二十二才校合了
