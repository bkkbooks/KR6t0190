body:
  text: 諸尊要抄第十一琰魔天五十天供神供施餓鬼法琰魔天注進琰魔天供一七箇日支度合蘇蜜名香白檀壇一面三尺二寸脅機一前燈臺二本半疊一枚壇敷布一端蠟燭布一端或二丈壇供米三石五斗乃至七石御明油三升五合乃至七升銀錢料紙三帖閼伽桶一口有杓閼伽折敷三枚小刀一阿闍梨承仕一人驅使二人淨衣白色右進注如件年月日某伴僧二口金剛般若經轉讀事在云云事供後可蠟燭燃火隨位次第每位誦真言供之耳十二天供並星供等蠟燭之燃火事同之也此法振鈴可有也燈明之外蠟燭常燈明之分也白飯四杯居樣在振鈴列壇之時不可振之可隨時云云次第石山以亥刻可行之云云道場觀壇上有惡字放光明遍大地成琉璃寶地其上亦有惡字放光明成宮殿七寶莊嚴幡蓋寶樹周匝莊嚴此殿四門開每門皆有階道此殿內有壇場其上有字變成壇荼印印變成琰魔法王乘水牛左右前後有后妃婇女太山府君五道冥官等眷屬圍繞次加持七處請車次大鉤召但真言末加琰魔耶翳醯呬句次網獻座但有二意一水牛座二荷葉座右手頭指大指頭相跓如荷葉形左拳安腰明曰縛曰羅毗羅耶莎呵本尊琰魔天合掌地風中節背著以空押風唵縛曰羅迦捨右印言金剛界二十天內也又閻魔王合掌地風入掌空從風上至中南吠縛薩縛多耶娑縛賀右胎藏印言也次后印普印歸命沒哩底野二合吠娑縛賀次妃印惠手垂五輪健吒相同鈴印左安腰歸命摩哩怛野吠娑縛賀次太山府君普印歸命質怛羅二合矩破多二合野娑縛賀次五道大神普印唵一閻魔羅闍二合烏揭羅毗梨耶三阿揭車四娑縛賀次司命普印伺命伺命多都多都唵哆本尼耶娑縛賀次司録普印已者已者毗迦良娑縛賀次拏吉尼左舒掌合面門出舌附掌如食人血勢歸命頡唎二合訶娑呵次遮文荼印前印大指頭指掬也云云仰定手作掬當胸上如受髑髏之形惠拳安腰呪歸命護嚕護嚕左門拏娑縛賀次成就仙普印歸命悉馱尾儞也阿利南娑縛賀次毗那夜賀二手內縛二中指竪交又以二風各附中指二大附頭側加持五處唵摩訶哦拏波多曳莎賀次若用諸神呪者右手拳舒風頭少屈召之唵嚕迦嚕迦羯羅耶娑縛賀次五供印明次事供蠟燭燃火次撥遣唵嚩曰羅二合穆乞叉莎賀與呵三度彈指之念誦次第佛眼大日心經二十一卷尊勝陀羅尼二十一返琰魔天千返后妃北斗九曜司録諸神三種一字次次如卷數案但心經尊勝等三種真言不書之云云銀錢三杯幡琰魔北斗七星九曜幣各二本都狀表白所可讀云云北斗七星真言以此真言用炎魔天供唵颯跢而曩野云云琰魔天供所奉供供養法十四箇度奉念佛眼真言一千四百遍大日真言一千四百返本尊真言一萬四千返炎魔后炎魔妃北斗九曜太山府君五道大神司命司録諸神一字金輪已上真言各一千四百返右奉為國母仙院御息災安穩增長寶壽御願圓滿始自六月三十日至于今日并二七箇日夜之間殊致精誠奉供如右年月日某已上勸修寺醍醐仁和寺卷數案金剛般若在之或説佛眼大日釋迦十一面地藏本尊已下部類金剛般若一卷心經尊勝陀羅尼光明真言三歸一字已上醍醐流或八不頌可誦也十二天供在別如常五十天供小野四種念誦云四臂不動為中尊云云十二天九曜二十八宿合謂五十天或加四大明王除羅計二天謂五十二天大師御作云五十天供十二天二十八宿九曜加四臂不動尊云五十天也亦加四大尊除羅計云五十二天也五大尊十二天北斗七星十二宮神五星二十八宿已上六十九也四臂不動四大明王十二天泰山府君五道大神大吉祥天北斗七星十二宮神及以五星二十八宿已上七十天聖天在別深祕深祕神供如常在別但勸修寺一流云神供法淨水一桶五穀粥一桶在杓散米一折敷花少少香少少幣十二本先拂淨地次三部護身次加持香水次灑淨次敷花十二天座次幣立次淨地次淨土變觀琉璃地次如來拳次大鉤召印真言次十二天各別印真言各加翳醯之句次四明次加持飮食三古印唵三波羅三波羅吽次甘露印舒右五指向外加食真言曰曩莫蘇嚕鉢耶怛他蘖多耶怛儞也他唵蘇嚕蘇嚕鉢羅蘇嚕娑呵次鑁字觀飮食中有鑁字成甘露法食次水三杓次香三返次花三返次粥各十二天方供之次普供養次散供花次啓白次心經次回向次撥遣又淨土變結如來拳印觀大地悉成琉璃寶地諸神等坐列居金銀器其數無量如此觀已加持七處佛名口傳云散供之次唱可之曩謨寶勝如來曩謨妙色身如來曩謨甘露如來曩謨廣博身如來曩謨離怖畏如來云云施餓鬼法軌云銅器或瓷食多少隨意西域記第八云摩揭陀國稻種其粒麁大香味越光色特甚彼俗謂之供大人米云云儀軌云不令高三尺諸鬼不能食云云施餓鬼法欲施一切餓鬼飮食者先須發廣大慈悲心普召餓鬼一切靈祇天仙等點定淨處拂地或棚莫用桃柳石榴樹下儲一器淨食和少淨水向東方而施或居或立先三部被甲護身等次淨地次淨土變如來拳印唵僕欠次普集右手空火相捻招風三返想法界中一切餓鬼悉皆雲集唵步布人哩迦哩多里怛他引蘖多也次開咽喉前印不招風指此名破地獄門及開咽喉印唵步布人帝哩迦哩多哩怛他蘖多引也次取食器居手誦偈至心奉上一器淨食普施十方盡虛空界一切餓鬼先亡久滅山川地主乃至廣野諸鬼神等請來至此受我此食依我呪食離苦得樂往生淨土發菩提心行菩薩道晝夜恆常擁護於我一切善願皆令滿足次五大願如常又云加持飮食印右手大指摩中指甲而外彈次結前印當食器誦加持飮食真言曰唵三婆羅三婆羅吽想一切餓鬼皆得摩伽陀國七七斛食食已皆生天上淨土令行者業障消除增益壽命次甘露施無畏印唵蘇嚕蘇嚕鉢羅蘇嚕鉢羅蘇嚕娑縛賀想飯食及水變成無量乳及甘露令諸餓鬼平等受用師説云誦二十一返或七返次鑁字加持七遍展開五指向下臨食器誦鑁字七遍此名普施一切餓鬼印次寫置淨地或流水樹下或淨石上寫畢更勿回顧又勿近殿基石階次五如來名號各稱三返南無過去寶勝如來除慳貪業福智圓滿南無妙色身如來破醜陋形圓滿相好南無甘露王如來潅法身心令受快樂南無廣博身如來咽喉廣大飯食受用南無離怖畏如來恐怖悉除離餓鬼趣次發菩提心真言已上合點或本麁唵冒地質多沒馱波陀野弭次三昧耶戒真言曰唵三摩耶薩怛鑁想諸鬼神等受菩薩三昧耶戒皆堪聞甚深祕法師説尊勝陀羅尼三返或千手陀羅尼次光明真言二十一返或七返心經祈願檀波羅蜜真言二十一返願施此食所生功德普將回施法界有情共生淨土疾得成佛或本偈也次撥遣作拳印彈指為聲唵縛曰羅穆乞叉穆又以御本重校了一校了建保六年二月二十五日於遍知院以御本書了金剛佛子憲丨生丨二十七丨建長二年六月六日賜極樂房御本書寫了求法沙門顯成生丨二十二丨校合了
