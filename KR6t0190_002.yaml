body:
  text: 諸尊要抄第二孔雀經法已上圖如此護摩聖天十二天皆悉上番之中修之神供下番中上臘行之御加持如常初夜後夜上番十人引率也但後夜發願無之下番發願句至心發願轉讀經王功德威力天衆地類倍增法樂護持其聖王國主國母御産平安色力增長玉體安穩增長寶壽恆受快樂無邊御願決定圓滿決定成就院內安穩諸人快樂及以法界平等利益次五大願衆生無邊福智無邊次金打下番始經云云下番回向句所修功德回向護持國王國母聖主御産平安玉體安穩增長寶壽色力增長恆受快樂無邊御願決定圓滿決定成就回向院內回向諸人回向天下回向大菩提勸請句大孔雀明王慈悲尊七佛慈氏賢聖衆御加持呪摩喻羅枳覽底娑縛賀三寶院傳也大或經奧陀羅尼仁和寺説孔雀經法種子三摩耶尾上安半月形云云部主金輪小野或無能勝醍醐傳普通七佛種阿三摩耶五古印金剛合掌歸命薩縛沒馱冒地薩怛縛紇里捺野儞也吠奢儞曩莫薩縛尾泥娑縛賀私云胎以此真言名一切佛心云云師云多寶真言云云慈氏種三摩耶蓮花上迅疾印印言金剛掌旋轉掌心相著心前云云歸命引一摩訶瑜引誐瑜擬宜以反寧瑜詣洗縛利欠惹利計娑婆呵阿種三梵篋印梵篋也真言歸命一係賭鉢羅二合底也二微蘖多羯磨涅入闍多三吽梵號阿曩多密號集法金剛舍種三梵篋印梵篋也真言聲聞呪也梵號舍利弗怛羅密號般若金剛目種三梵篋印內縛竪火輪圓滿錫杖相云云真言聲聞呪也梵號夢努誐羅也野拏密號妙用金剛須菩提種三梵篋印梵篋印真言聲聞呪也梵號蘇菩提密號無相金剛形像左執袈裟角右與願坐赤蓮花比丘形也四大聲聞皆同形也目蓮右手作拳舒坐赤蓮花印有觀念口傳也祕祕外縛立合檀惠禪智餘六指可翥云云拂厄難印名羽打云云師主祕説或傳云外縛善無畏傳云云言如常口傳云真言末可加彼呪云云一火天如常二部主三本尊中央本尊七佛右回供之勸請印言大鉤召也四諸尊三十七尊師傳吉説也云云或説七佛五世天如常御加持呪經呪云云怛儞也他野嚩底馱𩕳等云云又本尊呪禮佛之時可稱七佛名號云云五種香中央燒沈香東方白膠香南方紫礦南方芥子鹽和之師傳云紫礦代用湯黃云云西方以蘇和安息香北方薰陸香又云紫礦若無時鹽交香燒之云云持者向東三五七人不斷聲一二三七日一切災禍悉皆殄滅除不至心云云法務傳云安半月有二義一者半滿月等而為莊嚴意二者顯法七日成就一義也云云師主口傳也法務傳云若略時中方香只前香燒樣有云云但二種香火舍一口諸天供物上觀置鑁字護摩時用花座聲聞等又同云云大壇中經箱置之中方瓶孔雀尾三筋並立之云云以落馱血作紫礦云云但師主説未其説委細習之云云字輪觀如常阿等大谷覺俊阿闍梨傳云種子瑜三摩尾部主金輪勃嚕唵印蓮花三摩耶又有五種印云云可尋之師主説也不審也被仰也梵號阿利耶摩訶瑜密號佛母金剛或説護世金剛已上勸修寺法務傳也師主傳受之云云種子鑁三半月印如先部主無能勝七佛種阿三五古印言在別慈種瑜三迅疾印印言在別緣種縛三錫杖聲種係三梵篋印言在別南方燒替用湯黃云云東方燒替用百和香云云無紫礦時芥子鹽舂和合用之禮佛時先須菩提之句已上千心在之裏云緣印言內縛立火輪峯圓合歸命縛娑縛賀聲印言梵篋印歸命係賭鉢羅二合底也二合野尾蘖多羯磨涅惹多吽已上裏書也今此法以阿波羅爾多明王印明為別結界云云口傳印言內縛竪二中指頭拄云云唵護嚕護嚕戰拏引里摩蹬擬娑縛賀醍醐流大壇左護摩壇次十二天次聖天壇也但可依處便也云云勸修寺流大壇右方次第立之云云建長二年四月十六日賜極樂坊御本書寫之畢求法沙門顯成生丨二十二丨
