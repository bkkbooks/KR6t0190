body:
  text: 諸尊要抄第十三太元聖天十二天焰摩天太元法天蓋樣中央本體舊黃色幡一流懸之但依舊包結付之云云更中央懸白色幡云云每時大阿闍梨大壇三匝回之次著禮盤作法等如常右繞三匝文云諸有永離一切過無邊功德莊嚴身一向饒益衆生者我今悉皆歸命禮弓箭太刀各百枚鉤棒鐵杖各十二枚瓶二十四口小野僧正傳云云四天王結護作法結願時如例御加持了次四天結界伴僧上番下臘二人下番下臘二人合四人大壇四角立其次第先丑寅角辰巳未申戌亥如次立了然後初帳角柱棒始次第打六動丑寅呪伴僧之中上臘誦之下臘令勤之御加持香水加持并御衣加持本尊呪誦之伴僧本呪用之但香水加持之時禮盤乍立發願等行之伴僧共立牛王杖持加持如真言院云云御加持初夜後夜許如常但十二日乃至十四日牛王加持三時御衣加持三時香水加持等也云云本尊讃曩謨阿吒縛摩訶傅吒摩訶藥叉郁曩謨素都帝本尊真言唵多利馱保利婆羅保利柘頡迷柘頡迷馱羅薩多烏鹽毗娑縛賀以或本點之種子三摩大刀印普通印合掌但以二大押二水中節云云言本呪已上帝曉傳大乘院良雅阿闍梨傳同之用智拳印云云種子三摩大力印智拳印言本呪已上前大僧正定海傳大師御傳云御請來祕説也種子鑁三摩輪千輻印智拳印言本呪普通説云增益修之種子三摩塔智拳印唵縛曰羅怛馱鑁又用本呪云云小野傳云種子鑁三劍輪智拳印言本呪祕説云調伏修之種子吽三劍印內縛三股印真言本呪小野一説云種調伏三劍輪印三戟印外縛二大指二中指二小指立合云云息災護摩部主大日金界諸尊段三十七尊調伏護摩部主不動諸尊段五大尊或諸尊段五大尊或諸尊四十四羅殺百部鬼神供之種子尊吽荷葉座勸請撥遣胎藏諸藥叉印言用之世天段四大天王已上異無之御本一本云已下三次第或本祕法等卷中書之但十二天次第私注之炎魔王供引妙鈔文云云是雖不知誰人之記祕法書寫中在之仍私暫加書許也歡喜天頚次第壇前普禮著座禮塗香三密觀淨三業三部被甲加持香水加持浴油以小印誦大呪百八返加持之加持供物次取油置壇中像放著油中覽字觀觀佛金剛起普禮表白神分祈願五悔發願五大觀普供養三力等大金剛輪地結四方結道場觀如來拳印觀五輪世界其上有劍字成毗那耶迦山上有阿字成寶宮殿中亦有阿字變成荷葉座上有字共變成歡喜天男女二像共象頭人身相向互抱而立無量聖衆前後圍繞深祕深祕也大虛空藏小金剛輪送車輅請車輅勸請本尊結本尊印以大指來去真言曰唵簸迦羅主拏禰縛哆野弱薩婆訶召請四明拍掌虛空網火院閼伽荷葉座五供印明摩尼供三力偈等現供一一捧供之但留蘿蔔根酒團可供潅油前後云云四智讃如常本尊讃普印本尊讃末各隨法可加句普供養三力祈願等禮佛入我我入觀本尊加持正念誦本尊印明字輪觀大日加持本尊加持佛眼次供蘿蔔酒團右方次潅油以心中心呪浴之後夜時四百返浴之日中時三百返浴之每百返了彌可成祈願浴油返數滿了左方蘿蔔根酒團等可供之散念誦佛眼大日正觀音十一面如意輪心呪本尊心中呪千返心呪千返悅豫真言千返調和真言五百返大金剛輪真言一字百返法施等心經仁王經偈歟次五佛印明普供養三力等次現供左方四智讃本尊讃普供養三力祈願等禮佛隨心回向五悔終段解界撥遣三部被甲普禮出道場或浴油之後用字輪觀云云此傳尤神妙也或見舊本等或依明師説粗記之偏以愚慮非注之十二天頚次第私記之壇前普禮辨供著座塗香三密觀淨三業三部被甲加持香水加持供物覽字觀淨地觀佛金剛起普禮表白神分祈願五悔發願五大願普供養三力偈大金剛輪地結四方結道場觀有寶宮殿中有曼荼羅中央有瑟瑟座座上有頡哩字成蓮花上有憾字成利劍變成四臂不動尊羯磨身四方四角及內四隅有惡字成荷葉座其數十二也其上伊舍那等十二天安座各天衣纒身大虛空藏送車輅請車輅大鉤召四明拍掌不動結界虛空網火院大三昧耶閼伽花座荷葉座五供印明現供但燈明供了次用蠟燭四智讃普供三力十二天印明自伊舍那乃至月天以次用之念誦五供現供讃普供三力祈願等禮佛回向五悔終段解界撥遣出堂十二天印真言大自在天右手作拳安腰左手五指直立相著地水二指屈中節火風空各少相去唵嚕拏羅耶娑縛賀帝釋天左五指直堅相著地水屈中節以風著火背空屈中節唵因捺羅耶娑縛賀火天右手五指直竪屈空相著掌頭指屈召之唵阿誐那曳娑縛賀焰魔天二地屈中節背相著二風屈背著二空押各風中節即成唵焰摩耶娑縛賀羅剎天右五指直竪屈地水中節以空押地水甲唵地哩底曳娑縛賀水天左拳空勿入掌風直立中節少屈唵縛嚕拏耶娑縛賀風天右五指直竪地水屈中節唵縛耶吠娑縛賀毗沙門如常梵天左五指相著竪少屈其高少過肩想成蓮花唵沒羅𭼒摩曳娑縛賀地天鉢印唵畢哩體微曳娑縛賀日天前印以二空頭各拄水下文唵阿儞怛耶娑縛賀月天如梵天印但仰掌想中有潔白月唵戰捺羅耶娑縛賀敬愛壇琰魔王供次第師説云以亥刻可供之云云先辨供物所謂五穀以堅調為吉粥應知和香花水但蘇蜜加入粥又傍插果子壇上壇敷并散花如例尊像向南其壇四肘若三肘可隨處便宜又儲閼伽一前並飯羹果子燈明各二杯居壇一方而彼粥上插蠟燭隨位次第分居其次第在圖次著座次三部護身次加持香水等如前次表白神分等次三部心印護身等次地界次牆界次道場觀如妙鈔作此觀已誦唵穆欠真言加持七處次大虛空藏次小金剛輪次送車次請車次大鉤召但真言末加琰魔耶翳醯枳句次空網次火院次閼伽次獻座但有二意一水牛座二荷葉座惠手五指直立大指橫掌此四葉印也真言曰歸命阿娑縛賀次焰魔王印二手合掌二風二地相背入月二空並立從二風中節上超之致二火內第三節相跓水火頭令相合真言曰歸命縛無背反縛娑縛二合多野娑縛賀已上妙鈔在之次塗香以左手執右手腕右手申五指外真言曰唵微薩羅微薩羅娑縛二合賀次花二手內相叉為縛開仰之二頭指側頭相拄之二大著頭指下明曰唵部哩惹縛二合多蘭多詣娑呵次燒香二手背相合舒二頭指側相跓之延二大安頭指下真言曰用前塗香真言也次飮食二手作鉢形真言曰唵縛曰羅尾縛曰藍二合娑縛賀次燈右拳舒大頭指相拄明曰唵微縛哩二合多路者曩吽發吒次事供但粥上蠟燭燃之隨位次第每位各真言供之了次讃次普供養印真言但觀念在口傳次三力祈願禮佛在別次焰魔天印加持四處次念誦次般若心經三卷次後供養次讃普供養已下作法如例次撥遣唵縛曰羅二合穆乞叉莎呵與呵三度彈指之次三部被甲等次出堂了胎藏云檀荼印如常虛心合掌二地二風入掌背相合以空押風歸命吠無背反種子縛裟縛二合多野二合娑縛賀一校了御本云建保六年三月十二日於遍知院以御本書之了金剛佛子憲丨生丨二十七丨建長二年五月二十七日賜極樂房御本書寫了求法沙門顯成生丨二十二丨校合了
