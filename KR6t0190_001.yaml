body:
  text: 諸尊要抄第一所望五大虛空藏多羅尊愛染王千手大威德金剛藥叉金剛童子北斗聖天除災藥師尊勝聖觀音千手準胝北斗炎魔天滅罪阿彌陀阿閦尊勝光明真言隨求虛空藏馬頭法花寶樓閣滅惡趣延命藥師延命準胝北斗炎魔天孔雀經法花經壽命經産生藥師金輪隨求一字文殊千手多羅尊烏芻沙麼金剛童子訶利帝一髻文殊異本無之惡夢大威德八字文殊訶利帝呪咀轉法輪六字經大威德怨家大威德金翅鳥王天變孔雀經仁王經大佛頂愛染王一字金輪尊星王熾盛光八字文殊五大虛空藏北斗已上依師主口傳等注之祕説也已上又御本有次第奧釋迦阿彌陀阿閦藥師延命多羅菩薩普賢延命釋迦種子三摩鉢諸師皆用之部主大日胎諸尊三十七尊根本印定惠各舒五輪空火相捻左仰心前右覆左上勿相著曩莫三曼多沒馱南婆薩縛吃哩捨濕素娜曩薩嚩達摩嚩始多鉢羅鉢多誐誐曩三摩三摩娑縛賀如來慈護真言唵沒馱昧底里縛曰羅囉乞叉憾莎訶師主曰犯土處必可誦之又名文殊慈護云云勸請句一代教主釋迦尊普賢文殊諸薩埵禮佛句釋迦牟尼薩怛他誐多發願句寂靜金剛正念誦大呪或小呪曩莫三曼多沒馱南婆莎訶阿彌陀種子三摩開敷蓮花獨股以為其莖云云部主大日胎或觀音諸尊三十七尊根本印言外縛中指如蓮葉云云唵阿密栗多帝勢迦羅吽或前印用大呪又定印已上或本注也又佛母或佛眼印真言大小如常勸請句極樂教主彌陀尊蓮花部中諸聖衆發願句清淨金剛禮佛句南無阿利野彌陀婆野薩怛他誐多正念誦觀自王呪伴僧大呪御加持真言金剛界羯磨會無量壽真言用之阿閦滅罪種子三摩五股部主大日金根本印金剛外縛忍願直立如針真言唵惡屈芻二合毗野二合吽正念誦呪大呪藥師除病延命産生正大無壇上有哦字變成象象上有紇哩字成蓮花臺臺上有阿字成月輪月輪上有吽字成金剛杵金剛杵變成藥師如來光明具足相好圓滿日光月光十二神將護法聖衆前後圍繞諸師同之金剛杵者或三股又五股或獨股師説云種子三摩壷名十二上願壷是祕事大谷傳三壷朱又説吽三五股又説阿三五股寶山印唵戶盧戶盧戰拏利摩登祇莎呵羯磨會阿閦印言如常又御本無之此一行又御本有理趣房傳次行理趣房傳云種吽三壷印寶山印諸師説云三壷印法界定印師主云此印祕之又説云三獨股印言鉢印唵戶盧戶盧等或傳云三五古端朱付有之無用歟又説云三五古端朱付有之無用乎部主大日諸尊八大菩薩觀音左勢至右彌勒文殊藥王藥上無盡意法檀花又説三十七尊師主云寶山印唵戶盧戶盧法界定印此印之上觀藥壷以此藥施主及一切衆生治惡業煩惱病真言大呪或小呪祕祕大呪如常心呪曰唵鞞殺逝鞞殺逝三沒羯帝娑婆訶鉢印大呪又用戶盧戶盧師説云法界定印用心呪又大呪祕印也在異本此事與端書同觀念云云內五古印大呪祕祕或傳云佛頂印用之云云平救傳云寶山印用戶盧戶盧朱此印消災儀軌説日光菩薩印言金剛縛二大指直立二食指屈中節而端相拄餘六指散舒向外三旋轉嚕褒儞庾多月光菩薩印言右手作拳置腰左手大指小指相捻如執花立臂向外想掌中有伏兔唵贊捺羅鉢羅娑野娑縛賀十二藥叉印十二皆用之右手作拳屈人指如鉤真言如常勸請印真言用佛部印二輪向之招之唵爾曩爾迦翳醯曳呬婆誐嚩妬引瑟抳舍娑婆二合賀正念誦用心呪伴僧呪用大呪云云御加持大呪梵號禮佛南無阿利野佩殺紫野麌嚕吠女里也薩他多蘖多密號不動金剛觀請句十二上願薄伽梵日光月光諸菩薩發願句本尊界會十二上願醫王善逝醫王薄伽日光月光十二神將兩部界會建立壇場安置本尊新寫藥師經一卷置壇中本願或隨願七佛等造五色幡懸五方高四十九尺造七層車輪燈燃四十九燈香花飮食隨力所辨云云以五色線四十九結繫病人項所修之間每日放生四十九頭水陸有情請七口僧一人阿闍梨二人讀經四人念真言延命種子三摩甲胄根本印二手作拳仰二頭指相鉤當心云云真言唵嚩曰羅喻曬娑婆呵部主大日胎藏諸尊三十七尊禮佛句曩謨縛曰羅謨迦三摩耶薩怛縛發願句真實金剛勸請句本尊界會延命尊金剛部中諸聖衆正念誦真言本呪伴僧本呪御加持真言本呪發願句三世常住延命薩埵多羅菩薩青蓮花已開却合部主正觀音諸尊六觀音印二手內縛進力竪申合拄禪智並立真言唵多利咄多唎咄唎娑縛賀禮佛曩謨阿利耶多羅發願悲生金剛正念誦大呪御加持伴僧同字輪觀阿等普賢延命法右方薩王愛喜寶光幢笑鉤索左方法利因語業護牙拳鎖鈴四頭像二十臂種子三甲胄又説三甲胄大御室傳云惡三摩五古部主大日諸尊三十七尊如常勸請句普賢延命大悲尊金剛部中諸聖衆梵號曩謨縛曰羅謨迦三摩耶薩怛縛密號真實金剛正念誦呪本呪御加持真言伴僧本呪字輪觀阿等師説云大樂不空身即普賢延命一佛也種子仍迦字可為種子也金剛智三藏云金剛壽命薩埵智身者五智聚集而為大樂金剛薩埵以四波羅蜜十六大菩薩而為二十臂以五分法身而為寶冠內四供而為禪悅外四供而為法喜四攝方便三世諸佛而為毛孔額已上過去千佛心已上現在千佛心已下未來千佛以是號三世常住金剛壽命薩埵智身云云大壇上張白蓋蓋四角懸幡各二流合八流黃色護摩壇樣以黃土塗作方形其上畫甲胄形云云口傳曰四十九燈事輪燈一基有七層每層各燃七燈七七四十九燈云云高六尺許也口決云乳木長十指穀木桑木骨婁草烏瓜根莖也又用之口傳云胎藏大樂不空即是延命菩薩也象或三頭或四頭但四頭不見説所師傳也其相承者惠果大師真雅源仁益信亭子院法帝寬空寬朝濟信此法月一日八日十五日可修之金剛薩埵軌云請三七僧各可令讀四十九卷云云金剛智譯經也念誦此真言滿十萬遍即獲壽命增長云云尊形經云先須彩畫普賢菩薩如滿月童子形五佛頭冠右手持金剛杵左手持金剛鈴契鬘條緩帶坐千葉寶花花下有白象王象有三頭鼻卷獨股杵各具六牙其象四足踏一大金剛輪輪下有五千群象各負其輪於菩薩身放百寶光光外畫白月輪衆彩莊嚴云云口決云此尊遍身黃金色著五智寶冠具足二十臂而執持十六尊並四攝三摩耶標幟云云讃唵縛曰羅二合羅細堅固勇勤之義摩訶燥企耶大安樂之義縛曰羅二合喻帥摩訶喻帥壽命之義縛曰羅毗喻摩訶毗耶不老不死之義唵砧欲曩謨素都帝以又御本重交一交御本云建保六年二月十二日於遍智院以御本書了金剛佛子憲生丨二十七丨建長二年四月十一日賜極樂坊御本書寫之畢求法沙門顯成生年二十二年校合了
