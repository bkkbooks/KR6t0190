body:
  text: 諸尊要抄第三息災行之天蓋青色若空色今所懸幡前大僧正説也仍醍醐流近來如此云云大壇樣日中佛供大八杯小八杯合十六杯也汁果等各二杯也合十六杯後夜粥八杯許也護摩壇佛供等同大壇十二天壇佛供十三杯花瓶不立之十二天壇初夜一時也聖天壇佛供等如常聖天壇後夜日中修之本尊五大尊不動為本不動尊不持索持十二輻輪教令輪之故也四大明王又教令輪身也如次可觀回之或説以般若菩薩為本尊此傳不可用之彼菩薩是正法輪也正法輪不可為此法之本尊事歟五大尊種子三形般若菩薩真言梵篋印如胎藏真言同已上裏書也大理趣房傳云三昧耶形如前云云或傳云不動為本尊云云種子憾三鉤印獨古言部主般若菩薩本尊段本尊中央餘四大尊四方安之諸尊三十七尊上番回向醍醐所修功德回向三寶境界回向天衆地類所修功德回向國母仙院玉體安穩增長寶壽恆受快樂無邊御願決定圓滿回向諸宮回向院內安穩諸人快樂回向天下回向法界回向無上大菩提下番發願醍醐神供下香中上臘勤仕之至心發願轉讀般若功德威力天衆地類倍增威光國母安穩增長寶壽院內安穩諸人快樂乃以法界平等利益大阿闍梨時別平袈裟著之護摩壇作法大阿闍梨正念誦程護摩壇起伴僧座進壇場次普禮著座次塗香次淨三業三部被甲次二器香水或説覽字觀次大金剛輪印真言次羯磨加持次部主印言本尊印言次入護摩次退下著本座開白時表白等如常但三力偈之後金一度打之次讀經次次時大阿闍梨望神分時先金一打爾時上番伴僧中回向下座回向畢後大阿闍梨金二度打神分等如常時畢後金二度打之下番上臘發願四弘其後大阿闍梨金一度打退出每時大阿闍梨念誦畢護摩後後供以前於下座讀經經畢著禮盤後供等如常大阿闍梨正念誦程護摩壇阿闍梨進升其次餘小壇同進趣行之大壇曼荼羅懸之護摩壇十二天聖壇在之大阿闍梨正念誦並散念誦畢禮盤下座讀經一部畢返著禮盤大金剛輪真言七返次一字金打之次字輪觀次理供養次事供養等作法如常可行之耳大僧正定海仁王經法勤修之時八色幡八流懸樣圖醍醐流近來用此圖師主此定被懸之八色幡二十四流懸圖樣義範僧都傳白色幡二流正東紅色幡四流東南黑色幡二流正南煙色幡四流西南赤色幡二流正西水色幡四流西北黃色幡二流正北肉色幡四流東北上醍醐圓光院幡懸樣又如此遍知院僧都所令懸給也但又如此可懸歟不違本方理性房三密房不可違本方之由共被示云云以師主御本書畢私見經文之處不相違云云八色幡呬經説云幡竿端直及各於八方去處不遠如法安置云云東著白幡東南紅幡正南黑幡西南煙色幡西方赤幡西北青幡正北黃幡東北赤白幡如是八色隨方而置於竿頭上結繼鴆鵲䳄鳥尾極令端正勸修寺傳云天蓋并八色幡等不用之自餘作法同上正念誦真言經呪用之本尊加持外五古慈救呪根本印梵篋印御加持慈救呪加持物一字明師主物語云法務説云前大僧正以仁王經奧陀羅尼用御加持真言云云勸請句法務傳云云本尊界會般若持主下四字無聲唱之云云五大明王諸忿怒御加持發願時本尊句無聲唱之云云本尊界會般若菩薩五大明王等云云護摩壇作法同上云云伴僧二十四永久二年院御修法十二口有上下番不斷讀經如孔雀經法御加持用不動呪部主段降三世本尊段不動諸尊段四大明王勸請之時用大鉤召種子三昧耶形如前小野云云祕祕已上裏書也正念誦真言此醍醐傳也至極甚深也修習般若波羅蜜多菩薩真言也曩謨婆哦縛帝波羅壤波羅蜜多曳唵紇里地室利輸嚕多尾惹曳娑縛賀字輪觀阿縛羅訶佉五大尊印言各別結之次經臺印經呪次梵篋印言如常若略時用修習般若菩薩真言火天部主大日本尊不動諸尊四天世天如常已上醍醐傳甚深甚深祕中祕也經呪阿羅嬭迦羅嬭阿羅拏迦羅嬭摩訶波羅壤波羅密帝娑縛賀已上裏書也仁和寺傳云已下或本有支度卷數奧中方般若種吽三摩耶十二輻輪印經臺印真言唵地里輪嚕多尾惹曳娑縛賀東惡三五古南怛洛三金剛寶西滿三劍北憾三牙護摩時本尊段般若波羅蜜多菩薩諸尊段四大力等云云般若菩薩是不動也或説五大力菩薩為本尊云云仁和寺一説種子已上注進仁王經御修法一七箇日支度事合一大壇所蘇蜜名香沈五寶金銀水精琥珀真珠五香沈白檀薰陸安息甘松五藥豆蔲桂心遠志白朮甘草五穀稻穀胡麻大麥小麥菉豆壇一面脅機二前燈臺四本禮盤一腳在半疊壇敷布一端大幕一帖經機二十人前切燈臺十本不斷經料壇供米八斛御明油一斗七升五合七升御明料一斗五合不斷經并房油等料阿闍梨伴僧二十口承仕三人驅仕六人見丁二人淨衣白色一護摩壇壇一面脅機二前燈臺四本禮盤一腳在半疊壇敷布一端壇供米八石御明油七升一聖天壇壇一面三尺二寸脅機一前燈臺二本半疊一枚壇敷布一端壇供米三石五斗御明油七升一十二天壇壇一面三尺二寸脅機一前燈臺二本半疊一枚壇敷布一端蠟燭布一端壇供米一石四斗御明油三升五合一敷設供所雜具等如常右注進如件康治二年九月十五日行事大法師嚴實阿闍梨權大僧都法眼和尚位仁王經御修法所奉供大壇供護摩供聖天供十二天供諸神供奉讀仁王般若經奉念佛眼大日仁王般若陀羅尼般若菩薩不動明王降三世軍荼利大威德金剛藥叉護摩一字金輪右奉為國母殿下御息災安穩增長寶壽天變怪異消除解脫御願圓滿始自九月二十日迄于今日三七箇日夜之間殊致精誠奉修如件康治二年十月十一日阿闍梨權大僧都法眼和尚位寬信請雨經在別止風雨經法在別迦樓羅法在別以兩御本交合了御本云建保六年二月二十五日於遍智院以御本書了金剛佛子憲丨生年二十七才建長二年四月二十八日賜極樂坊御本書寫畢求法沙門顯成生年二十二才校合了
